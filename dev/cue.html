<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cueシート・デジタルフォーム</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: "Hiragino Kaku Gothic ProN", "ヒラギノ角ゴ ProN W3", sans-serif; }
        .border-black { border-color: black; }
        input, textarea { background: transparent; }
        /* Sync toggle active state */
        .sync-active { background-color: black; color: white; }
    </style>
</head>
<body class="bg-gray-100 p-2 md:p-6">
    <div id="app" class="mx-auto w-full max-w-[680px] bg-white border-2 border-black p-4 md:p-6 shadow-xl">
        
        <!-- Title Area -->
        <div class="flex justify-end mb-6">
            <div class="border-2 border-black px-8 py-1 font-bold text-2xl tracking-widest bg-gray-50">月定演</div>
        </div>

        <!-- Band Name Section -->
        <div class="border-2 border-black mb-2 flex">
            <div class="w-24 border-r-2 border-black p-2 font-bold flex items-center bg-gray-50 text-sm">バンド名</div>
            <div class="flex-grow flex flex-col justify-center">
                <input type="text" class="w-full px-2 outline-none h-8 text-lg" placeholder="バンド名を入力">
                <div class="text-[10px] text-right px-2 border-t border-gray-200">新規 or 既存（<input type="text" class="w-10 border-b border-black outline-none text-center" placeholder="回数"> 回目）</div>
            </div>
        </div>

        <!-- NG Date Section -->
        <div class="flex border-2 border-black mb-6">
            <div class="w-24 border-r-2 border-black p-2 font-bold flex items-center bg-gray-50 text-sm">出演NG日</div>
            <input type="text" class="flex-grow p-2 outline-none" placeholder="日付を入力">
        </div>

        <!-- Members Table -->
        <table class="w-full border-2 border-black mb-6 border-collapse">
            <thead>
                <tr class="border-b-2 border-black bg-gray-50">
                    <th class="border-r-2 border-black p-2 w-20 text-sm font-bold">学年</th>
                    <th class="border-r-2 border-black p-2 w-24 text-sm font-bold">パート</th>
                    <th class="p-2 text-sm font-bold">メンバー</th>
                </tr>
            </thead>
            <tbody id="member-table">
                <!-- Rows injected by JS -->
            </tbody>
        </table>

        <!-- Songs and Sync Section -->
        <div class="flex gap-2 mb-6">
            <table class="flex-grow border-2 border-black border-collapse">
                <thead>
                    <tr class="border-b-2 border-black bg-gray-50">
                        <th class="border-r-2 border-black p-1 w-10 font-bold text-sm">曲</th>
                        <th class="border-r-2 border-black p-1">曲名</th>
                        <th class="p-1 w-28 font-bold text-xs">曲の長さ</th>
                    </tr>
                </thead>
                <tbody id="song-table">
                    <!-- Rows injected by JS -->
                </tbody>
            </table>
            
            <!-- Sync Box -->
            <div class="w-20 border-2 border-black flex flex-col items-center bg-gray-50">
                <div class="font-bold border-b-2 border-black w-full text-center text-sm p-1">同期</div>
                <div id="sync-selector" class="flex-grow flex flex-col justify-around py-4 w-full cursor-pointer select-none">
                    <div id="sync-yes" onclick="toggleSync('yes')" class="text-center font-bold text-xl py-2 transition-colors">有</div>
                    <div id="sync-no" onclick="toggleSync('no')" class="text-center font-bold text-xl py-2 transition-colors sync-active">無</div>
                </div>
            </div>
        </div>

        <!-- Footer Grid -->
        <div class="grid grid-cols-2 gap-2">
            <div class="border-2 border-black p-3">
                <div class="font-bold mb-3 text-sm">初合わせ日程</div>
                <div class="text-sm space-y-2">
                    <div class="flex items-center">・日　　付 <input type="text" class="border-b border-gray-300 flex-grow ml-2 outline-none"></div>
                    <div class="flex items-center">・可能時間 <input type="text" class="border-b border-gray-300 flex-grow ml-2 outline-none"></div>
                    <div class="flex items-center">・所要時間 <input type="text" class="border-b border-gray-300 flex-grow ml-2 outline-none"></div>
                </div>
            </div>
            <div class="border-2 border-black p-3">
                <div class="font-bold text-sm mb-1">備考欄(意気込み、要望･･･)</div>
                <div class="text-[10px] mb-1 text-gray-500">トリ・大トリ希望もここへ</div>
                <textarea class="w-full h-[76px] outline-none resize-none text-sm p-1 border border-gray-100"></textarea>
            </div>
        </div>
    </div>

    <script>
        // Generate rows for members
        const memberTable = document.getElementById('member-table');
        for(let i=0; i<8; i++) {
            memberTable.innerHTML += `
                <tr class="border-b border-black h-10">
                    <td class="border-r-2 border-black"><input class="w-full px-2 outline-none"></td>
                    <td class="border-r-2 border-black"><input class="w-full px-2 outline-none"></td>
                    <td><input class="w-full px-2 outline-none"></td>
                </tr>`;
        }

        // Generate rows for songs
        const songTable = document.getElementById('song-table');
        for(let i=0; i<5; i++) {
            songTable.innerHTML += `
                <tr class="border-b border-black h-12">
                    <td class="border-r-2 border-black p-1 text-center font-bold bg-gray-50">${i + 1}</td>
                    <td class="border-r-2 border-black"><input class="w-full px-2 outline-none"></td>
                    <td><input class="w-full px-2 outline-none text-center font-mono" placeholder="00:00"></td>
                </tr>`;
        }

        // Sync toggle logic
        function toggleSync(val) {
            const yes = document.getElementById('sync-yes');
            const no = document.getElementById('sync-no');
            if(val === 'yes') {
                yes.classList.add('sync-active');
                no.classList.remove('sync-active');
            } else {
                no.classList.add('sync-active');
                yes.classList.remove('sync-active');
            }
        }
    </script>
</body>
</html>
