<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cueシート・デジタルフォーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        // Firebaseの設定と読み込み
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWtITnn5uMOPBgOY0Bd7Rt5IN1ry8XoJI",
            authDomain: "urakata-app.firebaseapp.com",
            projectId: "urakata-app",
            storageBucket: "urakata-app.firebasestorage.app",
            messagingSenderId: "407777765696",
            appId: "1:407777765696:web:045c2d94729022b4eab2a5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // パート略称変換用マップ
        const partMap = {
            "vocal": "Vo.", "guitar": "Gt.", "bass": "Ba.",
            "drums": "Dr.", "keyboard": "Key.", "chorus": "Cho."
        };

        let currentSync = null;

        // iTunes APIを使用した曲検索機能
        window.searchSong = async (btn) => {
            const row = btn.closest('tr');
            const titleInput = row.querySelector('.song-title');
            const durationInput = row.querySelector('.song-duration');
            const query = titleInput.value.trim();

            if (!query) {
                alert("曲名を入力してください");
                return;
            }
            
            const originalText = btn.innerText;
            btn.innerText = "検索中...";

            try {
                const url = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&country=jp&limit=1`;
                const res = await fetch(url);
                const data = await res.json();

                if (data.results.length > 0) {
                    const song = data.results[0];
                    const sec = Math.floor(song.trackTimeMillis / 1000);
                    const m = Math.floor(sec / 60);
                    const s = (sec % 60).toString().padStart(2, '0');
                    titleInput.value = song.trackName;
                    durationInput.value = `${m}:${s}`;
                } else {
                    alert("曲が見つかりませんでした");
                }
            } catch (e) {
                console.error(e);
                alert("検索中にエラーが発生しました");
            } finally {
                btn.innerText = originalText;
            }
        };

        // 同期トグル処理
        window.toggleSync = (val) => {
            currentSync = val;
            document.querySelectorAll('.sync-btn').forEach(btn => {
                btn.classList.toggle('bg-black', btn.innerText === val);
                btn.classList.toggle('text-white', btn.innerText === val);
                btn.classList.toggle('text-gray-400', btn.innerText !== val);
            });
            document.getElementById('error-msg').classList.add('hidden');
        };

        // Firebaseからデータ読み込み
        window.loadBandData = async (bandId) => {
            try {
                const bandRef = doc(db, "bands", bandId);
                const bandSnap = await getDoc(bandRef);
                if (!bandSnap.exists()) {
                    alert("バンドデータが見つかりません");
                    return;
                }

                const bandData = bandSnap.data();
                document.getElementById('band-name-input').value = bandData.name || '';
                document.getElementById('event-count-input').value = bandData.events ? bandData.events.length : 1;

                const memberIds = bandData.memberIds || [];
                const memberRows = document.querySelectorAll('.member-row');

                for (let i = 0; i < Math.min(memberIds.length, memberRows.length); i++) {
                    const userRef = doc(db, "users", memberIds[i]);
                    const userSnap = await getDoc(userRef);
                    if (userSnap.exists()) {
                        const u = userSnap.data();
                        const row = memberRows[i];
                        row.querySelector('.member-name').value = u.name || '';
                        row.querySelector('.member-year').value = u.year || '';
                        row.querySelector('.member-part').value = partMap[u.part?.toLowerCase()] || u.part || '';
                    }
                }
            } catch (e) { 
                console.error("Error: ", e); 
                alert("データの読み込みに失敗しました");
            }
        };

        // フォームバリデーションと送信処理
        window.submitData = () => {
            const errorDiv = document.getElementById('error-msg');
            let errors = [];
            const bandName = document.getElementById('band-name-input').value.trim();
            const count = document.getElementById('event-count-input').value.trim();
            const members = Array.from(document.querySelectorAll('.member-name')).filter(i => i.value.trim() !== "");
            const songs = Array.from(document.querySelectorAll('.song-title')).filter(i => i.value.trim() !== "");
            const durations = Array.from(document.querySelectorAll('.song-duration')).filter(i => i.value.trim() !== "");

            if(!bandName) errors.push("バンド名が入力されていません。");
            if(!count) errors.push("出演回数が入力されていません。");
            if(members.length === 0) errors.push("メンバーを少なくとも1名入力してください。");
            if(songs.length === 0) errors.push("曲名を少なくとも1曲入力してください。");
            if(songs.length !== durations.length) errors.push("全ての曲に長さを入力してください。");
            if(!currentSync) errors.push("同期の有無を選択してください。");

            if(errors.length > 0) {
                errorDiv.innerHTML = errors.map(e => `<div>・${e}</div>`).join('');
                errorDiv.classList.remove('hidden');
                errorDiv.scrollIntoView({ behavior: 'smooth' });
            } else {
                errorDiv.classList.add('hidden');
                alert("送信準備が整いました（このデータはサーバーへ送信可能です）");
            }
        };
    </script>
    <style>
        @media print {
            @page { size: A4; margin: 0; }
            body { padding: 0 !important; margin: 0 !important; background: white !important; }
            .no-print { display: none !important; }
            #print-area { border: 2px solid black !important; margin: 0 !important; width: 100% !important; max-width: none !important; box-shadow: none !important; }
        }
    </style>
</head>
<body class="bg-gray-100 p-2 md:p-6 text-black">
    <div id="print-area" class="mx-auto w-full max-w-[680px] bg-white border-2 border-black p-6 shadow-xl">
        <div class="flex justify-end mb-6">
            <div class="border-2 border-black px-8 py-1 font-bold text-2xl tracking-widest bg-gray-50">月定演</div>
        </div>
        <div class="border-2 border-black mb-2">
            <div class="flex border-b-2 border-black">
                <div class="w-24 border-r-2 border-black p-2 font-bold flex items-center bg-gray-50 text-sm">バンド名</div>
                <input id="band-name-input" class="w-full px-2 outline-none h-10 text-lg">
            </div>
            <div class="p-1 text-right text-xs">
                新規 or 既存（<input id="event-count-input" class="w-12 border-b border-black outline-none text-center" placeholder="回目"> 回目）
            </div>
        </div>
        <div class="border-2 border-black mb-6">
            <div class="flex">
                <div class="w-24 border-r-2 border-black p-2 font-bold flex items-center bg-gray-50 text-sm">出演NG日</div>
                <input class="w-full px-2 outline-none h-10">
            </div>
        </div>
        <table class="w-full border-2 border-black mb-6 border-collapse">
            <thead>
                <tr class="border-b-2 border-black bg-gray-50">
                    <th class="border-r-2 border-black p-2 w-20 text-sm font-bold">学年</th>
                    <th class="border-r-2 border-black p-2 w-24 text-sm font-bold">パート</th>
                    <th class="p-2 text-sm font-bold">メンバー</th>
                </tr>
            </thead>
            <tbody id="member-table"></tbody>
        </table>
        <div class="flex gap-2 mb-6">
            <table class="flex-grow border-2 border-black border-collapse">
                <thead>
                    <tr class="border-b-2 border-black bg-gray-50">
                        <th class="border-r-2 border-black p-1 w-10 font-bold text-sm">曲</th>
                        <th class="border-r-2 border-black p-1">曲名</th>
                        <th class="p-1 w-28 font-bold text-xs">曲の長さ</th>
                    </tr>
                </thead>
                <tbody id="song-table"></tbody>
            </table>
            <div class="w-20 border-2 border-black bg-gray-50 flex flex-col items-center">
                <div class="font-bold border-b-2 border-black w-full text-center text-sm p-1">同期</div>
                <div class="flex flex-col w-full h-full justify-evenly">
                    <button onclick="toggleSync('有')" class="sync-btn p-1 font-bold text-gray-400">有</button>
                    <div class="border-b border-black"></div>
                    <button onclick="toggleSync('無')" class="sync-btn p-1 font-bold text-gray-400">無</button>
                </div>
            </div>
        </div>
        <div id="error-msg" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 text-sm"></div>
        <div class="no-print flex gap-4 mt-4">
            <button onclick="loadBandData('GyOs5xdbRty6xnS1pO5M')" class="bg-black text-white px-4 py-2 rounded text-sm hover:bg-gray-800 transition">バンド情報読込</button>
            <button onclick="window.print()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700 transition">PDFとして出力</button>
            <button onclick="submitData()" class="bg-green-600 text-white px-4 py-2 rounded text-sm hover:bg-green-700 transition">送信する</button>
        </div>
    </div>
    <script>
        const memberTable = document.getElementById('member-table');
        const songTable = document.getElementById('song-table');
        // メンバー行の生成
        for(let i=0; i<8; i++) {
            memberTable.innerHTML += `<tr class="member-row border-b border-black h-10"><td class="border-r-2 border-black"><input class="w-full px-2 outline-none text-center member-year"></td><td class="border-r-2 border-black"><input class="w-full px-2 outline-none text-center member-part"></td><td><input class="w-full px-2 outline-none member-name"></td></tr>`;
        }
        // 曲行の生成
        for(let i=0; i<5; i++) {
            songTable.innerHTML += `<tr class="border-b border-black h-10"><td class="border-r-2 border-black text-center font-bold bg-gray-50">${i+1}</td><td class="border-r-2 border-black flex gap-1"><input class="w-full px-2 outline-none song-title"><button onclick="searchSong(this)" class="text-[10px] bg-gray-200 px-1 border-l border-black hover:bg-gray-300 transition">検索</button></td><td><input class="w-full px-2 outline-none text-center font-mono song-duration" placeholder="00:00"></td></tr>`;
        }
    </script>
</body>
</html>
