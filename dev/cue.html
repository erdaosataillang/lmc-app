<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cueシート・デジタルフォーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sync-btn.active { transition: all 0.2s; }
        /* スマホでのタップ時のハイライトを消す */
        input, button, .sugg-item { -webkit-tap-highlight-color: transparent; }
        
        /* 印刷時のスタイル */
        @media print {
            @page { size: A4; margin: 10mm; }
            body { background: white !important; padding: 0 !important; }
            .no-print { display: none !important; }
            #print-area { border: 2px solid black !important; box-shadow: none !important; width: 100% !important; margin: 0 auto !important; }
            * { -webkit-print-color-adjust: exact !important; color-adjust: exact !important; }
        }
    </style>
</head>

<body class="bg-gray-100 p-2 md:p-4 min-h-screen">
    <div id="print-area" class="mx-auto w-full max-w-[680px] bg-white border-2 border-black p-4 md:p-8 shadow-2xl relative">
        
        <div class="flex justify-end mb-6 md:mb-8">
            <div class="border-2 border-black px-6 md:px-10 py-1 md:py-2 font-bold text-xl md:text-2xl tracking-widest bg-gray-50 uppercase">月定演</div>
        </div>
        
        <div class="border-2 border-black mb-6 md:mb-8">
            <div class="flex border-b-2 border-black items-stretch">
                <div class="w-24 md:w-28 border-r-2 border-black p-2 md:p-3 font-bold bg-gray-50 flex items-center justify-center text-sm md:text-base">バンド名</div>
                <input id="band-name-input" class="flex-grow px-3 py-2 outline-none text-sm md:text-base">
            </div>
            <div class="p-2 text-right text-xs font-bold text-gray-500 bg-gray-50">
                新規 or 既存（<input id="event-count-input" class="w-12 border-b border-gray-400 outline-none text-center bg-transparent" placeholder="1"> 回目）
            </div>
        </div>

        <table class="w-full border-2 border-black mb-6 md:mb-8 border-collapse">
            <tbody id="member-table"></tbody>
        </table>

        <div class="flex flex-col md:flex-row gap-4 mb-6 md:mb-8">
            <table class="flex-grow border-2 border-black border-collapse w-full">
                <tbody id="song-table"></tbody>
            </table>
            
            <div class="w-full md:w-24 border-2 border-black flex flex-row md:flex-col items-center">
                <div class="font-bold border-b-2 md:border-b-2 border-black md:border-r-0 border-r-2 w-24 md:w-full text-center text-sm p-2 md:p-3 bg-gray-50 flex items-center justify-center">同期</div>
                <div class="flex md:flex-col flex-grow w-full">
                    <button type="button" class="sync-btn flex-grow p-2 md:p-4 font-bold text-gray-400 md:border-b border-black md:border-r-0 border-r border-black hover:bg-gray-100 transition focus:outline-none" data-val="有">有</button>
                    <button type="button" class="sync-btn flex-grow p-2 md:p-4 font-bold text-gray-400 hover:bg-gray-100 transition focus:outline-none" data-val="無">無</button>
                </div>
            </div>
        </div>

        <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded mb-6 text-sm"></div>
        
        <div class="no-print flex flex-wrap gap-2 md:gap-4 mt-6 md:mt-8 pt-4 md:pt-6 border-t border-gray-200 justify-center md:justify-start">
            <button id="load-btn" type="button" class="bg-gray-600 text-white px-4 py-3 md:py-2 rounded text-sm md:text-base font-bold shadow-md active:bg-gray-700 w-[45%] md:w-auto">情報読込</button>
            <button type="button" id="print-btn" class="bg-black text-white px-4 py-3 md:py-2 rounded text-sm md:text-base font-bold shadow-md active:bg-gray-800 w-[45%] md:w-auto">PDF出力</button>
            <button type="button" id="submit-btn" class="bg-green-600 text-white px-8 py-3 md:py-2 rounded text-sm md:text-base font-bold shadow-md active:bg-green-700 w-full md:w-auto mt-2 md:mt-0">送信する</button>
        </div>
    </div>

    <!-- UI/ロジック分離 -->
    <script>
        let currentSync = null;

        // メンバーテーブルの生成
        const mTable = document.getElementById('member-table');
        for(let i=0; i<8; i++) {
            mTable.insertAdjacentHTML('beforeend', `
                <tr class="member-row border-b border-black h-10 md:h-12">
                    <td class="border-r-2 border-black w-16 md:w-20"><input type="text" class="w-full h-full text-center outline-none member-grade text-sm md:text-base" placeholder="学年"></td>
                    <td class="border-r-2 border-black w-20 md:w-24"><input type="text" class="w-full h-full text-center outline-none member-part text-sm md:text-base" placeholder="パート"></td>
                    <td><input type="text" class="w-full h-full px-2 md:px-4 outline-none member-name text-sm md:text-base" placeholder="名前"></td>
                </tr>`);
        }
        
        // 曲テーブルの生成 (親要素に relative を付与してサジェストを確実に配置)
        const sTable = document.getElementById('song-table');
        for(let i=0; i<5; i++) {
            sTable.insertAdjacentHTML('beforeend', `
                <tr class="border-b border-black h-12 md:h-14">
                    <td class="border-r-2 border-black text-center font-bold bg-gray-50 w-10 text-sm md:text-base">${i+1}</td>
                    <td class="border-r-2 border-black flex items-center h-full p-0 relative song-cell">
                        <input type="text" class="w-full h-full px-2 md:px-4 outline-none song-title text-sm md:text-base" placeholder="曲名">
                        <button type="button" class="search-btn px-2 md:px-3 h-full text-xs md:text-sm font-bold text-blue-600 bg-blue-50 border-l border-blue-200 active:bg-blue-200">検索</button>
                    </td>
                    <td class="w-24 md:w-28"><input type="text" inputmode="numeric" class="w-full h-full text-center outline-none font-mono song-duration text-sm md:text-base" placeholder="00:00"></td>
                </tr>`);
        }

        // 同期ボタンのトグル処理
        document.querySelectorAll('.sync-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.sync-btn').forEach(b => {
                    b.classList.remove('active', 'bg-black', 'text-white');
                    b.classList.add('text-gray-400');
                });
                this.classList.add('active', 'bg-black', 'text-white');
                this.classList.remove('text-gray-400');
                currentSync = this.dataset.val;
            });
        });

        // 楽曲検索 (プロキシを廃止し、iTunes APIへ直接通信)
        document.querySelectorAll('.search-btn').forEach(btn => {
            btn.addEventListener('click', async function() {
                const row = this.closest('tr');
                const titleInput = row.querySelector('.song-title');
                const query = titleInput.value.trim();
                
                if (!query) return;
                
                const originalText = this.innerText;
                this.innerText = "検索中";
                this.disabled = true;

                const url = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&entity=song&country=jp&limit=5`;
                
                try {
                    // Appleへ直接通信（ブロッカーがオフなら最も安定します）
                    const res = await fetch(url, { headers: { 'Accept': 'application/json' }, cache: 'no-store' });
                    
                    if (!res.ok) {
                        throw new Error(`HTTPエラー: ${res.status}`);
                    }
                    
                    const data = await res.json();

                    if (data.results && data.results.length > 0) {
                        showSuggestions(data.results, row);
                    } else {
                        alert("曲が見つかりませんでした");
                    }

                } catch (error) {
                    console.error("iTunes Search Error:", error);
                    alert("通信エラーが発生しました。広告ブロッカー(280blocker等)がオンになっている場合はオフにして再度お試しください。");
                } finally {
                    this.innerText = originalText;
                    this.disabled = false;
                }
            });
        });

        // サジェストリストの表示 (iPhoneのタップ問題対策版)
        function showSuggestions(results, row) {
            // 既存のサジェストを削除
            document.querySelectorAll('.suggestion-box').forEach(b => b.remove());

            const td = row.querySelector('.song-cell');
            const titleInput = row.querySelector('.song-title');
            const durationInput = row.querySelector('.song-duration');

            const box = document.createElement('div');
            box.className = 'suggestion-box absolute left-0 top-full mt-[2px] bg-white border-2 border-black z-[9999] shadow-2xl max-h-60 overflow-y-auto rounded-b-md w-64 md:w-full';
            
            let html = '';
            results.forEach(s => {
                const sec = Math.floor(s.trackTimeMillis / 1000);
                const time = `${Math.floor(sec / 60)}:${(sec % 60).toString().padStart(2, '0')}`;
                html += `
                <div class="sugg-item p-3 border-b border-gray-200 active:bg-blue-100 hover:bg-gray-50 bg-white cursor-pointer" 
                     data-title="${s.trackName.replace(/"/g, '&quot;')}" data-time="${time}">
                    <div class="font-bold text-sm truncate text-black pointer-events-none">${s.trackName}</div>
                    <div class="text-xs text-gray-500 truncate pointer-events-none">${s.artistName}</div>
                </div>`;
            });
            box.innerHTML = html;
            td.appendChild(box);

            // iOS Safari 対策: touchstart を使ってキーボードが閉じる前にデータを反映する
            const selectHandler = (e) => {
                const item = e.target.closest('.sugg-item');
                if (item) {
                    e.preventDefault();
                    titleInput.value = item.dataset.title;
                    durationInput.value = item.dataset.time;
                    box.remove();
                }
            };
            
            box.addEventListener('touchstart', selectHandler, {passive: false});
            box.addEventListener('click', selectHandler);

            // リストの外側をクリック・タップしたら閉じる処理
            setTimeout(() => {
                const closeHandler = (e) => {
                    const currentBox = document.querySelector('.suggestion-box');
                    if (currentBox && !currentBox.contains(e.target) && e.target !== titleInput && !e.target.classList.contains('search-btn')) {
                        currentBox.remove();
                        document.removeEventListener('click', closeHandler);
                        document.removeEventListener('touchstart', closeHandler);
                    }
                };
                document.addEventListener('click', closeHandler);
                document.addEventListener('touchstart', closeHandler);
            }, 50);
        }

        // 印刷ボタン
        document.getElementById('print-btn').addEventListener('click', () => window.print());

        // 送信ボタン (バリデーション)
        document.getElementById('submit-btn').addEventListener('click', () => {
            const errorDiv = document.getElementById('error-msg');
            let errors = [];
            
            if(!document.getElementById('band-name-input').value.trim()) errors.push("バンド名を入力してください");
            if(!document.getElementById('event-count-input').value.trim()) errors.push("出演回数を入力してください");
            
            const hasMember = Array.from(document.querySelectorAll('.member-name')).some(i => i.value.trim() !== "");
            if(!hasMember) errors.push("メンバーを少なくとも1名入力してください");
            
            const songs = Array.from(document.querySelectorAll('.song-title')).filter(i => i.value.trim() !== "");
            const durations = Array.from(document.querySelectorAll('.song-duration')).filter(i => i.value.trim() !== "");
            if(songs.length === 0) errors.push("曲名を少なくとも1曲入力してください");
            if(songs.length !== durations.length) errors.push("全ての曲に長さを入力してください");
            
            if(!currentSync) errors.push("同期の有無を選択してください");
            
            if(errors.length > 0) {
                errorDiv.innerHTML = errors.map(e => `<div>・${e}</div>`).join('');
                errorDiv.classList.remove('hidden');
                errorDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
                errorDiv.classList.add('hidden');
                alert("送信準備が完了しました！");
            }
        });
    </script>

    <!-- Firebase連携 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        try {
            const firebaseConfig = {
                apiKey: "AIzaSyAWtITnn5uMOPBgOY0Bd7Rt5IN1ry8XoJI",
                authDomain: "urakata-app.firebaseapp.com",
                projectId: "urakata-app",
                storageBucket: "urakata-app.firebasestorage.app",
                messagingSenderId: "407777765696",
                appId: "1:407777765696:web:045c2d94729022b4eab2a5"
            };

            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const partMap = { "vocal": "Vo.", "guitar": "Gt.", "bass": "Ba.", "drums": "Dr.", "keyboard": "Key.", "chorus": "Cho." };

            document.getElementById('load-btn').addEventListener('click', async function() {
                const btn = this;
                const originalText = btn.innerText;
                btn.innerText = "読込中...";
                btn.disabled = true;

                try {
                    const bandSnap = await getDoc(doc(db, "bands", "GyOs5xdbRty6xnS1pO5M"));
                    if (!bandSnap.exists()) {
                        alert("データが見つかりませんでした");
                        return;
                    }
                    const bandData = bandSnap.data();
                    document.getElementById('band-name-input').value = bandData.name || '';
                    document.getElementById('event-count-input').value = bandData.events ? bandData.events.length : 1;
                    
                    const memberIds = bandData.memberIds || [];
                    const rows = document.querySelectorAll('.member-row');
                    
                    for (let i = 0; i < Math.min(memberIds.length, rows.length); i++) {
                        const uSnap = await getDoc(doc(db, "users", memberIds[i]));
                        if (uSnap.exists()) {
                            const u = uSnap.data();
                            rows[i].querySelector('.member-grade').value = u.year || u.grade || ''; 
                            rows[i].querySelector('.member-part').value = partMap[u.part?.toLowerCase()] || u.part || '';
                            rows[i].querySelector('.member-name').value = u.name || '';
                        }
                    }
                } catch (e) { 
                    console.error("Data Load Error:", e);
                    alert("データの読み込みに失敗しました");
                } finally {
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            });
        } catch(err) {
            console.error("Firebase Initialization Failed:", err);
            document.getElementById('load-btn').addEventListener('click', () => alert('データベース接続準備中です。'));
        }
    </script>
</body>
</html>
