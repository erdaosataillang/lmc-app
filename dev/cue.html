<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cueシート・デジタルフォーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWtITnn5uMOPBgOY0Bd7Rt5IN1ry8XoJI",
            authDomain: "urakata-app.firebaseapp.com",
            projectId: "urakata-app",
            storageBucket: "urakata-app.firebasestorage.app",
            messagingSenderId: "407777765696",
            appId: "1:407777765696:web:045c2d94729022b4eab2a5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const partMap = { "vocal": "Vo.", "guitar": "Gt.", "bass": "Ba.", "drums": "Dr.", "keyboard": "Key.", "chorus": "Cho." };
        let currentSync = null;

        window.searchSong = async (btn) => {
            const row = btn.closest('tr');
            const titleTd = btn.closest('td');
            const titleInput = titleTd.querySelector('.song-title');
            const durationInput = row.querySelector('.song-duration');
            const suggestBox = titleTd.querySelector('.suggest-box');
            const query = titleInput.value.trim();

            if (!query) return;
            
            btn.innerText = "検索中";
            try {
                // キャッシュを無効化し、クエリを安全にエンコード
                const url = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&country=jp&limit=5`;
                const res = await fetch(url, { cache: 'no-cache' });
                const data = await res.json();

                suggestBox.innerHTML = '';
                if (data.results && data.results.length > 0) {
                    data.results.forEach(song => {
                        const sec = Math.floor(song.trackTimeMillis / 1000);
                        const m = Math.floor(sec / 60);
                        const s = (sec % 60).toString().padStart(2, '0');
                        const item = document.createElement('div');
                        item.className = 'p-2 border-b border-gray-200 hover:bg-gray-100 cursor-pointer text-xs truncate bg-white';
                        item.innerText = `${song.trackName} - ${song.artistName} (${m}:${s})`;
                        item.onclick = () => {
                            titleInput.value = song.trackName;
                            durationInput.value = `${m}:${s}`;
                            suggestBox.classList.add('hidden');
                        };
                        suggestBox.appendChild(item);
                    });
                    suggestBox.classList.remove('hidden');
                } else {
                    alert("曲が見つかりませんでした");
                }
            } catch (e) {
                console.error("Search Error:", e);
                alert("検索に失敗しました。時間をおいて試してください。");
            } finally {
                btn.innerText = "検索";
            }
        };

        window.toggleSync = (val) => {
            currentSync = val;
            document.querySelectorAll('.sync-btn').forEach(btn => {
                btn.classList.toggle('bg-black', btn.innerText === val);
                btn.classList.toggle('text-white', btn.innerText === val);
                btn.classList.toggle('text-gray-400', btn.innerText !== val);
            });
        };

        window.loadBandData = async (bandId) => {
            try {
                const bandRef = doc(db, "bands", bandId);
                const bandSnap = await getDoc(bandRef);
                if (!bandSnap.exists()) return;
                const bandData = bandSnap.data();
                document.getElementById('band-name-input').value = bandData.name || '';
                document.getElementById('event-count-input').value = bandData.events ? bandData.events.length : 1;
            } catch (e) { console.error(e); }
        };

        window.submitData = () => {
            const errorDiv = document.getElementById('error-msg');
            let errors = [];
            if(!document.getElementById('band-name-input').value.trim()) errors.push("バンド名が未入力です。");
            if(!currentSync) errors.push("同期の有無を選択してください。");
            if(errors.length > 0) {
                errorDiv.innerHTML = errors.map(e => `<div>・${e}</div>`).join('');
                errorDiv.classList.remove('hidden');
            } else {
                errorDiv.classList.add('hidden');
                alert("送信準備完了");
            }
        };
    </script>
    <style>
        @media print {
            @page { size: A4; margin: 0; }
            body { padding: 0 !important; margin: 0 !important; background: white !important; }
            .no-print { display: none !important; }
            #print-area { border: 2px solid black !important; margin: 0 !important; width: 100% !important; max-width: none !important; }
        }
    </style>
</head>
<body class="bg-gray-100 p-2 text-black">
    <div id="print-area" class="mx-auto w-full max-w-[680px] bg-white border-2 border-black p-6 shadow-xl">
        <div class="flex justify-end mb-6"><div class="border-2 border-black px-8 py-1 font-bold text-2xl tracking-widest bg-gray-50">月定演</div></div>
        <div class="border-2 border-black mb-2">
            <div class="flex border-b-2 border-black">
                <div class="w-24 border-r-2 border-black p-2 font-bold flex items-center bg-gray-50 text-sm">バンド名</div>
                <input id="band-name-input" class="w-full px-2 outline-none h-10">
            </div>
            <div class="p-1 text-right text-xs">新規 or 既存（<input id="event-count-input" class="w-12 border-b border-black outline-none text-center" placeholder="回目"> 回目）</div>
        </div>
        <table class="w-full border-2 border-black mb-6 border-collapse">
            <thead><tr class="border-b-2 border-black bg-gray-50"><th class="border-r-2 border-black p-2 w-20 text-sm font-bold">学年</th><th class="border-r-2 border-black p-2 w-24 text-sm font-bold">パート</th><th class="p-2 text-sm font-bold">メンバー</th></tr></thead>
            <tbody id="member-table"></tbody>
        </table>
        <div class="flex gap-2 mb-6">
            <table class="flex-grow border-2 border-black border-collapse">
                <tbody id="song-table"></tbody>
            </table>
            <div class="w-20 border-2 border-black bg-gray-50 flex flex-col items-center">
                <div class="font-bold border-b-2 border-black w-full text-center text-sm p-1">同期</div>
                <button onclick="toggleSync('有')" class="sync-btn p-1 font-bold text-gray-400 w-full">有</button>
                <button onclick="toggleSync('無')" class="sync-btn p-1 font-bold text-gray-400 w-full">無</button>
            </div>
        </div>
        <div id="error-msg" class="hidden bg-red-100 border border-red-400 text-red-700 p-3 rounded mb-4 text-sm"></div>
        <div class="no-print flex gap-4 mt-4">
            <button onclick="loadBandData('GyOs5xdbRty6xnS1pO5M')" class="bg-black text-white px-4 py-2 rounded text-sm">読込</button>
            <button onclick="window.print()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm">出力</button>
            <button onclick="submitData()" class="bg-green-600 text-white px-4 py-2 rounded text-sm">送信</button>
        </div>
    </div>
    <script>
        const mTable = document.getElementById('member-table');
        const sTable = document.getElementById('song-table');
        for(let i=0; i<8; i++) mTable.innerHTML += `<tr class="member-row border-b border-black h-10"><td class="border-r-2 border-black"><input class="w-full px-2 outline-none text-center member-year"></td><td class="border-r-2 border-black"><input class="w-full px-2 outline-none text-center member-part"></td><td><input class="w-full px-2 outline-none member-name"></td></tr>`;
        for(let i=0; i<5; i++) sTable.innerHTML += `<tr class="border-b border-black h-10 relative"><td class="border-r-2 border-black p-1"><input class="w-full px-2 outline-none song-title"><button onclick="searchSong(this)" class="bg-gray-200 px-1 text-[10px]">検索</button><div class="suggest-box absolute top-full left-0 w-full bg-white border border-black hidden z-50"></div></td><td><input class="w-full px-2 outline-none text-center song-duration" placeholder="00:00"></td></tr>`;
    </script>
</body>
</html>
