<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cueシート・デジタルフォーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWtITnn5uMOPBgOY0Bd7Rt5IN1ry8XoJI",
            authDomain: "urakata-app.firebaseapp.com",
            projectId: "urakata-app",
            storageBucket: "urakata-app.firebasestorage.app",
            messagingSenderId: "407777765696",
            appId: "1:407777765696:web:045c2d94729022b4eab2a5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const partMap = { "vocal": "Vo.", "guitar": "Gt.", "bass": "Ba.", "drums": "Dr.", "keyboard": "Key.", "chorus": "Cho." };
        let currentSync = null;

        // iTunes API Search
        window.searchSong = async (btn) => {
            const row = btn.closest('tr');
            const titleInput = row.querySelector('.song-title');
            const durationInput = row.querySelector('.song-duration');
            const query = titleInput.value.trim();

            if (!query) return;
            const originalText = btn.innerText;
            btn.innerText = "検索中...";

            try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&country=jp&limit=5`, { cache: 'no-store' });
                const data = await res.json();

                if (data.results && data.results.length > 0) {
                    showSuggestions(data.results, row);
                } else {
                    alert("曲が見つかりませんでした");
                }
            } catch (e) {
                console.error(e);
                alert("検索に失敗しました");
            } finally {
                btn.innerText = originalText;
            }
        };

        function showSuggestions(results, row) {
            let container = document.getElementById('suggestions');
            if (!container) {
                container = document.createElement('div');
                container.id = 'suggestions';
                container.className = 'absolute z-50 bg-white border-2 border-black w-64 shadow-xl max-h-60 overflow-y-auto';
                document.body.appendChild(container);
            }
            const rect = row.querySelector('.song-title').getBoundingClientRect();
            container.style.top = `${rect.bottom + window.scrollY}px`;
            container.style.left = `${rect.left + window.scrollX}px`;
            
            container.innerHTML = results.map(s => `
                <div class="p-2 border-b border-gray-200 hover:bg-gray-100 cursor-pointer text-sm" data-title="${s.trackName}" data-time="${formatTime(s.trackTimeMillis)}">
                    ${s.trackName} <span class="text-gray-500 text-xs">(${s.artistName})</span>
                </div>
            `).join('');
            
            container.querySelectorAll('div').forEach(item => {
                item.onclick = () => {
                    row.querySelector('.song-title').value = item.dataset.title;
                    row.querySelector('.song-duration').value = item.dataset.time;
                    container.innerHTML = '';
                };
            });
            document.addEventListener('click', (e) => { if (container && !container.contains(e.target)) container.innerHTML = ''; }, {once: true});
        }

        function formatTime(ms) {
            const sec = Math.floor(ms / 1000);
            return `${Math.floor(sec / 60)}:${(sec % 60).toString().padStart(2, '0')}`;
        }

        window.toggleSync = (btn, val) => {
            document.querySelectorAll('.sync-btn').forEach(b => {
                b.classList.remove('active', 'bg-black', 'text-white');
                b.classList.add('text-gray-400');
            });
            btn.classList.add('active', 'bg-black', 'text-white');
            btn.classList.remove('text-gray-400');
            currentSync = val;
        };

        window.loadBandData = async (bandId) => {
            try {
                const bandRef = doc(db, "bands", bandId);
                const bandSnap = await getDoc(bandRef);
                if (!bandSnap.exists()) return;
                const bandData = bandSnap.data();
                document.getElementById('band-name-input').value = bandData.name || '';
                document.getElementById('event-count-input').value = bandData.events ? bandData.events.length : 1;
                const memberIds = bandData.memberIds || [];
                const rows = document.querySelectorAll('.member-row');
                for (let i = 0; i < Math.min(memberIds.length, rows.length); i++) {
                    const uSnap = await getDoc(doc(db, "users", memberIds[i]));
                    if (uSnap.exists()) {
                        const u = uSnap.data();
                        rows[i].querySelector('.member-name').value = u.name || '';
                        rows[i].querySelector('.member-part').value = partMap[u.part?.toLowerCase()] || u.part || '';
                    }
                }
            } catch (e) { console.error(e); }
        };

        window.submitData = () => {
            const errorDiv = document.getElementById('error-msg');
            let errors = [];
            if(!document.getElementById('band-name-input').value.trim()) errors.push("バンド名を入力してください");
            if(!currentSync) errors.push("同期の有無を選択してください");
            
            if(errors.length > 0) {
                errorDiv.innerHTML = errors.map(e => `<div>・${e}</div>`).join('');
                errorDiv.classList.remove('hidden');
                errorDiv.scrollIntoView({ behavior: 'smooth' });
            } else {
                errorDiv.classList.add('hidden');
                alert("送信完了しました");
            }
        };
    </script>
    <style>
        .sync-btn.active { transition: all 0.2s; }
        @media print {
            @page { size: A4; margin: 10mm; }
            .no-print { display: none !important; }
            #print-area { border: 2px solid black !important; box-shadow: none !important; width: 100% !important; }
        }
    </style>
</head>
<body class="bg-gray-100 p-4 min-h-screen">
    <div id="print-area" class="mx-auto w-[680px] bg-white border-2 border-black p-8 shadow-2xl">
        <div class="flex justify-end mb-8"><div class="border-2 border-black px-10 py-2 font-bold text-2xl tracking-widest bg-gray-50 uppercase">月定演</div></div>
        
        <div class="border-2 border-black mb-8">
            <div class="flex border-b-2 border-black"><div class="w-28 border-r-2 border-black p-3 font-bold bg-gray-50">バンド名</div><input id="band-name-input" class="w-full px-4 outline-none"></div>
            <div class="p-2 text-right text-xs font-bold text-gray-500">新規 or 既存（<input id="event-count-input" class="w-12 border-b border-gray-400 outline-none text-center" placeholder="1"> 回目）</div>
        </div>

        <table class="w-full border-2 border-black mb-8 border-collapse">
            <tbody id="member-table"></tbody>
        </table>

        <div class="flex gap-4 mb-8">
            <table class="flex-grow border-2 border-black border-collapse"><tbody id="song-table"></tbody></table>
            <div class="w-24 border-2 border-black flex flex-col items-center">
                <div class="font-bold border-b-2 border-black w-full text-center text-sm p-3 bg-gray-50">同期</div>
                <button onclick="toggleSync(this, '有')" class="sync-btn w-full p-4 font-bold text-gray-400 border-b border-black hover:bg-gray-100 transition">有</button>
                <button onclick="toggleSync(this, '無')" class="sync-btn w-full p-4 font-bold text-gray-400 hover:bg-gray-100 transition">無</button>
            </div>
        </div>

        <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded mb-6"></div>
        <div class="no-print flex gap-4 mt-8 pt-6 border-t border-gray-200">
            <button onclick="loadBandData('GyOs5xdbRty6xnS1pO5M')" class="bg-gray-600 text-white px-4 py-2 rounded">情報読込</button>
            <button onclick="window.print()" class="bg-black text-white px-4 py-2 rounded">PDF出力</button>
            <button onclick="submitData()" class="bg-green-600 text-white px-4 py-2 rounded">送信する</button>
        </div>
    </div>

    <script>
        const mTable = document.getElementById('member-table');
        const sTable = document.getElementById('song-table');
        for(let i=0; i<8; i++) mTable.innerHTML += `<tr class="member-row border-b border-black h-12"><td class="border-r-2 border-black w-20"><input class="w-full text-center outline-none"></td><td class="border-r-2 border-black w-24"><input class="w-full text-center outline-none member-part"></td><td><input class="w-full px-4 outline-none member-name"></td></tr>`;
        for(let i=0; i<5; i++) sTable.innerHTML += `<tr class="border-b border-black h-14"><td class="border-r-2 border-black text-center font-bold bg-gray-50 w-12">${i+1}</td><td class="border-r-2 border-black flex items-center"><input class="w-full px-4 outline-none song-title" placeholder="曲名"><button onclick="searchSong(this)" class="px-2 text-xs text-blue-600 underline hover:text-blue-800">検索</button></td><td class="w-24"><input class="w-full text-center outline-none font-mono song-duration" placeholder="00:00"></td></tr>`;
    </script>
</body>
</html>
