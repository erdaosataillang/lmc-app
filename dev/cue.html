<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cueシート・デジタルフォーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWtITnn5uMOPBgOY0Bd7Rt5IN1ry8XoJI",
            authDomain: "urakata-app.firebaseapp.com",
            projectId: "urakata-app",
            storageBucket: "urakata-app.firebasestorage.app",
            messagingSenderId: "407777765696",
            appId: "1:407777765696:web:045c2d94729022b4eab2a5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.loadBandData = async (bandId) => {
            try {
                const docRef = doc(db, "home/band", bandId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // バンド名セット
                    document.getElementById('band-name-input').value = data.name || '';

                    // メンバー表自動入力
                    const memberRows = document.querySelectorAll('.member-row');
                    data.memberNames.forEach((name, idx) => {
                        if (memberRows[idx]) {
                            memberRows[idx].querySelector('.member-name').value = name;
                        }
                    });
                    
                    console.log("Data loaded successfully");
                }
            } catch (e) {
                console.error("Error loading: ", e);
            }
        };
    </script>
    <style>
        body { font-family: sans-serif; }
        .sync-active { background-color: black; color: white; }
    </style>
</head>
<body class="bg-gray-100 p-2 md:p-6">
    <div id="app" class="mx-auto w-full max-w-[680px] bg-white border-2 border-black p-4 shadow-xl">
        
        <!-- ボタン追加：データ読み込み -->
        <button onclick="loadBandData('GyOs5xdbRty6xnS1pO5M')" class="mb-4 bg-black text-white px-4 py-1 text-sm rounded">データを読み込む</button>

        <div class="flex justify-end mb-6">
            <div class="border-2 border-black px-8 py-1 font-bold text-2xl bg-gray-50">月定演</div>
        </div>

        <div class="border-2 border-black mb-2 flex">
            <div class="w-24 border-r-2 border-black p-2 font-bold bg-gray-50 text-sm">バンド名</div>
            <div class="flex-grow">
                <input id="band-name-input" type="text" class="w-full px-2 outline-none h-8 text-lg" placeholder="バンド名">
            </div>
        </div>

        <table class="w-full border-2 border-black mb-6 border-collapse">
            <thead>
                <tr class="border-b-2 border-black bg-gray-50">
                    <th class="border-r-2 border-black p-2 w-20 text-sm">学年</th>
                    <th class="border-r-2 border-black p-2 w-24 text-sm">パート</th>
                    <th class="p-2 text-sm">メンバー</th>
                </tr>
            </thead>
            <tbody id="member-table">
                <!-- 8行生成 -->
            </tbody>
        </table>

        <!-- Songs and Sync Section -->
        <div class="flex gap-2 mb-6">
            <table class="flex-grow border-2 border-black border-collapse">
                <thead>
                    <tr class="border-b-2 border-black bg-gray-50">
                        <th class="border-r-2 border-black p-1 w-10 font-bold text-sm">曲</th>
                        <th class="border-r-2 border-black p-1">曲名</th>
                        <th class="p-1 w-28 font-bold text-xs">曲の長さ</th>
                    </tr>
                </thead>
                <tbody id="song-table">
                    <!-- Rows injected by JS -->
                </tbody>
            </table>
            
            <!-- Sync Box -->
            <div class="w-20 border-2 border-black flex flex-col items-center bg-gray-50">
                <div class="font-bold border-b-2 border-black w-full text-center text-sm p-1">同期</div>
                <div id="sync-selector" class="flex-grow flex flex-col justify-around py-4 w-full cursor-pointer select-none">
                    <div id="sync-yes" onclick="toggleSync('yes')" class="text-center font-bold text-xl py-2 transition-colors">有</div>
                    <div id="sync-no" onclick="toggleSync('no')" class="text-center font-bold text-xl py-2 transition-colors sync-active">無</div>
                </div>
            </div>
        </div>

        <!-- Footer Grid -->
        <div class="grid grid-cols-2 gap-2">
            <div class="border-2 border-black p-3">
                <div class="font-bold mb-3 text-sm">初合わせ日程</div>
                <div class="text-sm space-y-2">
                    <div class="flex items-center">・日　　付 <input type="text" class="border-b border-gray-300 flex-grow ml-2 outline-none"></div>
                    <div class="flex items-center">・可能時間 <input type="text" class="border-b border-gray-300 flex-grow ml-2 outline-none"></div>
                    <div class="flex items-center">・所要時間 <input type="text" class="border-b border-gray-300 flex-grow ml-2 outline-none"></div>
                </div>
            </div>
            <div class="border-2 border-black p-3">
                <div class="font-bold text-sm mb-1">備考欄(意気込み、要望･･･)</div>
                <div class="text-[10px] mb-1 text-gray-500">トリ・大トリ希望もここへ</div>
                <textarea class="w-full h-[76px] outline-none resize-none text-sm p-1 border border-gray-100"></textarea>
            </div>
        </div>
    </div>

    <script>
        const memberTable = document.getElementById('member-table');
        for(let i=0; i<8; i++) {
            memberTable.innerHTML += `
                <tr class="member-row border-b border-black h-10">
                    <td class="border-r-2 border-black"><input class="w-full px-2 outline-none"></td>
                    <td class="border-r-2 border-black"><input class="w-full px-2 outline-none"></td>
                    <td><input class="w-full px-2 outline-none member-name"></td>
                </tr>`;
        }
    </script>
</body>
</html>
