<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cueシート・デジタルフォーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        .sync-btn.active { background-color: #000; color: #fff; transform: scale(1.02); transition: all 0.2s; }
        .song-row:hover { background-color: #f9fafb; }
        @media print {
            @page { size: A4; margin: 0; }
            body { padding: 0 !important; background: white !important; }
            .no-print { display: none !important; }
            #print-area { border: 2px solid black !important; box-shadow: none !important; }
        }
    </style>
</head>
<body class="bg-gray-100 p-4 min-h-screen">

    <div id="print-area" class="mx-auto w-full max-w-[680px] bg-white border-2 border-black p-8 shadow-2xl transition-all duration-500">
        
        <!-- Header -->
        <div class="flex justify-end mb-8">
            <div class="border-2 border-black px-10 py-2 font-bold text-2xl tracking-widest bg-gray-50 uppercase shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                月定演
            </div>
        </div>

        <!-- Band Info Section -->
        <div class="border-2 border-black mb-8 shadow-[4px_4px_0px_0px_rgba(0,0,0,0.1)]">
            <div class="flex border-b-2 border-black">
                <div class="w-28 border-r-2 border-black p-3 font-bold flex items-center bg-gray-50">バンド名</div>
                <input id="band-name-input" class="w-full px-4 outline-none text-lg placeholder:text-gray-300" placeholder="バンド名を入力">
            </div>
            <div class="p-2 text-right text-xs font-bold text-gray-500">
                新規 or 既存（<input id="event-count-input" class="w-16 border-b border-gray-400 outline-none text-center" placeholder="1"> 回目）
            </div>
        </div>

        <!-- Member Table -->
        <table class="w-full border-2 border-black mb-8 border-collapse">
            <thead>
                <tr class="bg-gray-50 border-b-2 border-black">
                    <th class="border-r-2 border-black p-3 w-20 text-sm">学年</th>
                    <th class="border-r-2 border-black p-3 w-24 text-sm">パート</th>
                    <th class="p-3 text-sm text-left">メンバー氏名</th>
                </tr>
            </thead>
            <tbody id="member-table">
                <!-- JS will inject rows -->
            </tbody>
        </table>

        <!-- Songs & Sync Section -->
        <div class="flex gap-4 mb-8">
            <table class="flex-grow border-2 border-black border-collapse">
                <tbody id="song-table">
                    <!-- JS will inject rows -->
                </tbody>
            </table>
            
            <div class="w-24 border-2 border-black flex flex-col items-center shadow-[4px_4px_0px_0px_rgba(0,0,0,0.1)]">
                <div class="font-bold border-b-2 border-black w-full text-center text-sm p-3 bg-gray-50">同期</div>
                <button onclick="toggleSync(this, '有')" class="sync-btn w-full p-4 font-bold text-gray-400 hover:bg-gray-100 transition-colors border-b border-black">有</button>
                <button onclick="toggleSync(this, '無')" class="sync-btn w-full p-4 font-bold text-gray-400 hover:bg-gray-100 transition-colors">無</button>
            </div>
        </div>

        <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded text-sm mb-6 animate-pulse"></div>

        <div class="no-print flex gap-4 mt-8 pt-6 border-t border-gray-200">
            <button onclick="window.print()" class="flex-1 bg-black text-white py-3 font-bold hover:bg-gray-800 transition-transform active:scale-95 shadow-[4px_4px_0px_0px_rgba(0,0,0,0.3)]">PDF出力</button>
            <button onclick="submitData()" class="flex-1 bg-green-600 text-white py-3 font-bold hover:bg-green-700 transition-transform active:scale-95 shadow-[4px_4px_0px_0px_rgba(0,0,0,0.3)]">送信する</button>
        </div>
    </div>

    <script>
        const mTable = document.getElementById('member-table');
        const sTable = document.getElementById('song-table');

        // Generate Rows
        for(let i=0; i<8; i++) {
            mTable.innerHTML += `
                <tr class="border-b border-gray-200 h-12">
                    <td class="border-r-2 border-black text-center"><input class="w-full text-center outline-none"></td>
                    <td class="border-r-2 border-black text-center"><input class="w-full text-center outline-none"></td>
                    <td><input class="w-full px-4 outline-none"></td>
                </tr>`;
        }

        for(let i=0; i<5; i++) {
            sTable.innerHTML += `
                <tr class="song-row border-b border-black h-14">
                    <td class="border-r-2 border-black text-center font-bold bg-gray-50 w-12">${i+1}</td>
                    <td class="border-r-2 border-black"><input class="w-full px-4 outline-none song-title" placeholder="曲名"></td>
                    <td class="w-24"><input class="w-full text-center outline-none font-mono song-duration" placeholder="00:00"></td>
                </tr>`;
        }

        function toggleSync(btn, val) {
            document.querySelectorAll('.sync-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('error-msg').classList.add('hidden');
        }

        function submitData() {
            const errorDiv = document.getElementById('error-msg');
            errorDiv.classList.remove('hidden');
            errorDiv.innerText = "※ まだ送信先が設定されていません。サーバー連携をお待ちください。";
        }
    </script>
</body>
</html>
