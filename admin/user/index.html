<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members - LMC Admin</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 共通CSS -->
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* 万が一の真っ白防止用 */
        body.loading-failed { display: block !important; }
        
        /* スイッチのスタイル調整 */
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #e2e8f0; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #6366f1; }
        input:checked + .slider:before { transform: translateX(14px); }

        /* テーブル表示用の調整 */
        .member-table th { @apply px-4 py-3 text-left text-[10px] font-black text-gray-400 uppercase tracking-widest border-b border-gray-100; }
        .member-table td { @apply px-4 py-3 text-sm border-b border-gray-50; }
        .member-table tr:hover td { @apply bg-gray-50/50; }

        /* チェックボックスのスタイル */
        .custom-checkbox {
            @apply w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500 cursor-pointer;
        }

        /* 編集フォーム用入力スタイル */
        .edit-input {
            @apply w-full bg-white border border-gray-200 rounded-xl px-4 py-2 text-sm font-bold outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all;
        }
    </style>
</head>
<body id="main-body" class="min-h-screen flex overflow-hidden bg-[#f8fafc]">
    <!-- ローディング画面 -->
    <div id="initial-loader" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="w-16 h-16 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
        <p class="text-xs font-bold text-gray-400 tracking-widest uppercase">Initializing System...</p>
    </div>

    <!-- サイドバーコンテナ -->
    <div id="sidebar-container"></div>

    <!-- メインコンテンツ -->
    <main class="flex-1 ml-[260px] h-screen overflow-y-auto p-8 relative">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-xl font-extrabold text-gray-800 uppercase tracking-widest">Members</h2>
                <p class="text-[10px] text-gray-400 mt-1 font-bold uppercase tracking-wider">部員名簿・検索・管理</p>
            </div>
            <div id="db-status" class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest flex items-center gap-2">
                <i id="status-icon" class="fa-solid fa-circle text-[8px] text-gray-300"></i> <span id="status-text">Connecting...</span>
            </div>
        </header>

        <!-- ツールバー: 検索 & フィルタ -->
        <div class="bg-white rounded-[28px] shadow-sm border border-gray-100 p-6 mb-8">
            <div class="flex flex-wrap items-center justify-between gap-6">
                <!-- 検索ボックス -->
                <div class="flex flex-1 items-center gap-3 bg-gray-50 px-5 py-3 rounded-2xl max-w-md focus-within:ring-2 focus-within:ring-indigo-100 transition-all border border-transparent focus-within:border-indigo-200">
                    <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                    <input type="text" id="user-search-input" placeholder="名前・かな・楽器・学籍番号で検索..." class="bg-transparent border-none outline-none text-sm w-full font-bold">
                </div>

                <!-- 表示切替 & フィルタ -->
                <div class="flex flex-wrap items-center gap-6">
                    <!-- CSVダウンロードボタン -->
                    <button id="csv-download-btn" class="hidden px-4 py-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center gap-2 border border-indigo-100">
                        <i class="fa-solid fa-file-csv"></i> 
                        <span>CSVダウンロード (<span id="selected-count">0</span>)</span>
                    </button>

                    <!-- View Switcher -->
                    <div class="flex bg-gray-100 p-1 rounded-xl">
                        <button id="view-grid-btn" class="px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-tighter transition-all flex items-center gap-2 bg-white shadow-sm text-indigo-600">
                            <i class="fa-solid fa-grip"></i> Grid
                        </button>
                        <button id="view-table-btn" class="px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-tighter transition-all flex items-center gap-2 text-gray-400 hover:text-gray-600">
                            <i class="fa-solid fa-table-list"></i> Table
                        </button>
                    </div>

                    <!-- 現役生フィルタ -->
                    <div class="flex items-center gap-3 bg-gray-50 px-4 py-2 rounded-xl border border-gray-100 shadow-sm">
                        <span class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest whitespace-nowrap">現役生のみ (1-4年)</span>
                        <label class="switch">
                            <input type="checkbox" id="user-current-toggle" checked>
                            <span class="slider"></span>
                        </label>
                    </div>

                    <!-- ソート順 -->
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest text-gray-400">Sort:</span>
                        <select id="user-sort-select" class="bg-gray-50 border-none rounded-xl px-4 py-2 text-xs font-bold outline-none cursor-pointer hover:bg-gray-100 transition shadow-sm text-gray-700">
                            <option value="name">名前順 (50音)</option>
                            <option value="year">学年順</option>
                            <option value="birthday">誕生日順</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- コンテンツ表示エリア -->
        <div id="members-content-area">
            <!-- グリッド表示 -->
            <div id="users-grid-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 pb-12">
                <div class="col-span-full py-10 text-center text-gray-400 font-bold">
                    <span id="loading-status-text">部員データを読み込み中...</span>
                </div>
            </div>

            <!-- テーブル表示 -->
            <div id="users-table-container" class="hidden bg-white rounded-[28px] shadow-sm border border-gray-100 overflow-hidden mb-12">
                <div class="overflow-x-auto">
                    <table class="w-full member-table border-collapse">
                        <thead>
                            <tr class="bg-gray-50/50">
                                <th class="pl-6 w-10">
                                    <input type="checkbox" id="select-all-checkbox" class="custom-checkbox">
                                </th>
                                <th>名前</th>
                                <th>学年</th>
                                <th>学部</th>
                                <th>学籍番号</th>
                                <th>パート</th>
                                <th>誕生日</th>
                                <th class="pr-8 text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body">
                            <!-- JSでデータが挿入されます -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- ================= MODALS ================= -->

    <!-- 個人詳細モーダル -->
    <div id="user-detail-modal" class="hidden fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4">
        <div onclick="event.stopPropagation()" class="bg-white w-full max-w-lg rounded-[40px] shadow-2xl overflow-hidden relative animate-in zoom-in duration-200 flex flex-col max-h-[90vh]">
            <button onclick="window.closeUserDetail()" class="absolute top-4 right-4 w-10 h-10 bg-white/80 hover:bg-white rounded-full flex items-center justify-center text-gray-500 z-20 shadow-sm transition-colors"><i class="fa-solid fa-xmark"></i></button>
            <div id="user-modal-content" class="overflow-y-auto flex-1 p-0 text-left">
                <!-- JSでコンテンツが動的に注入されます -->
            </div>
        </div>
    </div>

    <!-- Logic -->
    <script type="module">
        import { initAdminPage, db } from "/js/admin-common.js";
        import { collection, onSnapshot, doc, updateDoc, Timestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let usersData = [];
        let filteredData = [];
        let userSearchQuery = "";
        let userShowOnlyCurrent = true;
        let userSortOrder = "name";
        let viewMode = "grid"; 
        let selectedUserIds = new Set();
        let isEditing = false;

        // 担当楽器の日本語マップ (drumsとdrumの両方に対応)
        const partMap = {
            'drum': 'ドラム',
            'drums': 'ドラム',
            'guitar': 'ギター',
            'vocal': 'ボーカル',
            'keyboard': 'キーボード',
            'bass': 'ベース'
        };

        const getPartName = (p) => {
            if (!p) return '未設定';
            const normalizedPart = p.toLowerCase();
            return partMap[normalizedPart] || p;
        };

        // 安全装置: 5秒経っても終わらなければローダーを消す
        const safetyTimer = setTimeout(() => {
            const loader = document.getElementById('initial-loader');
            if (loader) loader.style.opacity = '0';
            setTimeout(() => loader?.remove(), 300);
        }, 5000);

        // 初期化 (Firebaseパスを 'users' に戻し、安全な要素アクセスを行います)
        initAdminPage('users', (user) => {
            clearTimeout(safetyTimer);

            // ステータス表示の更新（nullチェック付き）
            const statusIcon = document.getElementById('status-icon');
            const statusText = document.getElementById('status-text');
            if (statusIcon) statusIcon.classList.replace('text-gray-300', 'text-emerald-400');
            if (statusText) statusText.innerText = "System Live";
            
            // 元のパス 'users' での監視
            onSnapshot(collection(db, 'users'), 
                (s) => {
                    usersData = s.docs.map(d => ({id:d.id, ...d.data()}));
                    renderUsers();
                    
                    // データの読み込みが完了したらローダーを消す
                    const loader = document.getElementById('initial-loader');
                    if (loader) {
                        loader.style.opacity = '0';
                        setTimeout(() => loader.remove(), 300);
                    }
                },
                (error) => {
                    console.error("Error fetching users:", error);
                    const statusTextEl = document.getElementById('loading-status-text');
                    if (statusTextEl) statusTextEl.innerText = "データの読み込みに失敗しました。";
                }
            );
        });

        // ----------------------------------------------------
        // Render Functions
        // ----------------------------------------------------

        function renderUsers() {
            const gridContainer = document.getElementById('users-grid-container');
            const tableContainer = document.getElementById('users-table-container');
            if (!gridContainer || !tableContainer) return;

            const q = userSearchQuery.toLowerCase();
            
            filteredData = usersData.filter(u => {
                const partJapanese = getPartName(u.part);
                return (u.name || "").toLowerCase().includes(q) || 
                       (u.kana || "").toLowerCase().includes(q) || 
                       (u.studentId || "").toLowerCase().includes(q) ||
                       (u.faculty || "").toLowerCase().includes(q) ||
                       (u.part || "").toLowerCase().includes(q) ||
                       partJapanese.toLowerCase().includes(q);
            });
            
            if (userShowOnlyCurrent) {
                filteredData = filteredData.filter(u => {
                    const yearVal = parseInt(u.year);
                    return !isNaN(yearVal) && yearVal >= 1 && yearVal <= 4;
                });
            }
            
            filteredData.sort((a,b) => {
                if (userSortOrder === "name") {
                    return (a.kana || a.name || "").localeCompare(b.kana || b.name || "", "ja");
                } else if (userSortOrder === "year") {
                    const yearA = parseInt(a.year) || 99;
                    const yearB = parseInt(b.year) || 99;
                    return yearA - yearB;
                } else {
                    const getSeconds = (field) => field?.seconds || (field instanceof Date ? field.getTime() / 1000 : 0);
                    return getSeconds(b.birthday) - getSeconds(a.birthday);
                }
            });

            updateSelectionUI();

            if (viewMode === "grid") {
                gridContainer.classList.remove('hidden');
                tableContainer.classList.add('hidden');
                renderGrid(filteredData);
            } else {
                gridContainer.classList.add('hidden');
                tableContainer.classList.remove('hidden');
                renderTable(filteredData);
            }
        }

        function renderGrid(data) {
            const container = document.getElementById('users-grid-container');
            if (data.length === 0) {
                container.innerHTML = `<div class="col-span-full py-20 text-center text-gray-300 font-bold text-[10px] tracking-widest uppercase">No members match your search</div>`;
                return;
            }
            
            const getYearColor = (year) => {
                const y = parseInt(year);
                switch(y) {
                    case 1: return 'bg-blue-50 text-blue-500 border-blue-100';
                    case 2: return 'bg-emerald-50 text-emerald-500 border-emerald-100';
                    case 3: return 'bg-amber-50 text-amber-600 border-amber-100';
                    case 4: return 'bg-rose-50 text-rose-500 border-rose-100';
                    default: return 'bg-gray-50 text-gray-400 border-gray-100';
                }
            };
            
            container.innerHTML = data.map(user => {
                const iconHtml = user.icon 
                    ? `<img src="${user.icon}" class="w-12 h-12 rounded-full object-cover border border-gray-100 shadow-sm group-hover:scale-105 transition-transform duration-300">` 
                    : `<div class="w-12 h-12 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-400 font-bold border border-indigo-100 shadow-sm text-lg">${(user.name||"?")[0]}</div>`;

                const yearColorClass = getYearColor(user.year);

                return `
                <div onclick="window.showUserDetail('${user.id}')" class="cursor-pointer p-5 border border-gray-100 rounded-[28px] hover:shadow-xl hover:-translate-y-0.5 transition-all flex items-center gap-4 bg-white shadow-sm group">
                    <div class="flex-shrink-0">
                        ${iconHtml}
                    </div>
                    <div class="flex-1 min-w-0 text-left">
                        <div class="flex items-center gap-2 mb-0.5">
                            <h4 class="font-bold text-gray-800 text-base group-hover:text-indigo-600 transition-colors whitespace-nowrap overflow-visible">${user.name}</h4>
                            ${user.year ? `<span class="${yearColorClass} text-[9px] font-black px-1.5 py-0.5 rounded-md border uppercase leading-none flex-shrink-0">${user.year}年</span>` : ''}
                        </div>
                        <p class="text-[9px] text-gray-400 font-bold tracking-wider truncate uppercase">${user.faculty || '学部未設定'} · ${user.kana || ''}</p>
                    </div>
                    <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-200 group-hover:bg-indigo-50 group-hover:text-indigo-500 transition-colors">
                        <i class="fa-solid fa-chevron-right text-[10px]"></i>
                    </div>
                </div>`;
            }).join('');
        }

        function renderTable(data) {
            const tableBody = document.getElementById('users-table-body');
            const selectAllCheck = document.getElementById('select-all-checkbox');
            if (data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="8" class="py-20 text-center text-gray-300 font-bold text-[10px] tracking-widest uppercase">No members found</td></tr>`;
                return;
            }

            const allSelectedInFiltered = data.every(u => selectedUserIds.has(u.id));
            if (selectAllCheck) selectAllCheck.checked = data.length > 0 && allSelectedInFiltered;

            tableBody.innerHTML = data.map(user => {
                const isSelected = selectedUserIds.has(user.id);
                const iconHtml = user.icon 
                    ? `<img src="${user.icon}" class="w-8 h-8 rounded-full object-cover">` 
                    : `<div class="w-8 h-8 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-400 font-bold text-[10px]">${(user.name||"?")[0]}</div>`;

                let birthStr = '-';
                if (user.birthday) {
                    const d = user.birthday.toDate ? user.birthday.toDate() : new Date(user.birthday.seconds * 1000 || user.birthday);
                    birthStr = d.toLocaleDateString('ja-JP');
                }

                return `
                <tr class="transition-colors ${isSelected ? 'bg-indigo-50/30' : ''}">
                    <td class="pl-6">
                        <input type="checkbox" class="user-checkbox custom-checkbox" data-id="${user.id}" ${isSelected ? 'checked' : ''}>
                    </td>
                    <td onclick="window.showUserDetail('${user.id}')" class="cursor-pointer">
                        <div class="flex items-center gap-3">
                            ${iconHtml}
                            <div>
                                <div class="font-bold text-gray-800">${user.name}</div>
                                <div class="text-[10px] text-gray-400 font-bold uppercase tracking-tighter">${user.kana || ''}</div>
                            </div>
                        </div>
                    </td>
                    <td onclick="window.showUserDetail('${user.id}')" class="cursor-pointer"><span class="font-bold text-gray-600">${user.year ? user.year + '年' : '-'}</span></td>
                    <td onclick="window.showUserDetail('${user.id}')" class="cursor-pointer"><span class="text-xs font-bold text-gray-500 uppercase">${user.faculty || '-'}</span></td>
                    <td onclick="window.showUserDetail('${user.id}')" class="cursor-pointer"><span class="font-mono text-xs text-gray-400">${user.studentId || '-'}</span></td>
                    <td onclick="window.showUserDetail('${user.id}')" class="cursor-pointer"><span class="text-xs font-bold text-indigo-500">${getPartName(user.part)}</span></td>
                    <td onclick="window.showUserDetail('${user.id}')" class="cursor-pointer"><span class="text-xs text-gray-500">${birthStr}</span></td>
                    <td class="pr-8 text-center">
                        <button onclick="window.showUserDetail('${user.id}')" class="w-8 h-8 rounded-full hover:bg-indigo-50 text-gray-300 hover:text-indigo-500 transition-colors">
                            <i class="fa-solid fa-ellipsis"></i>
                        </button>
                    </td>
                </tr>
                `;
            }).join('');

            document.querySelectorAll('.user-checkbox').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    const id = e.target.dataset.id;
                    if (e.target.checked) selectedUserIds.add(id);
                    else selectedUserIds.delete(id);
                    updateSelectionUI();
                });
            });
        }

        function updateSelectionUI() {
            const countLabel = document.getElementById('selected-count');
            const downloadBtn = document.getElementById('csv-download-btn');
            const count = selectedUserIds.size;
            if (countLabel) countLabel.innerText = count;
            if (downloadBtn) {
                if (count > 0) downloadBtn.classList.remove('hidden');
                else downloadBtn.classList.add('hidden');
            }
        }

        // ----------------------------------------------------
        // Detail & Edit Functions
        // ----------------------------------------------------

        window.showUserDetail = (userId) => {
            const user = usersData.find(u => u.id === userId);
            if (!user) return;
            isEditing = false;
            renderModalContent(user);
            const modal = document.getElementById('user-detail-modal');
            if (modal) modal.classList.remove('hidden');
        };

        function renderModalContent(user) {
            const content = document.getElementById('user-modal-content');
            if (!content) return;
            
            let birthStr = '未登録';
            let birthInputVal = '';
            if (user.birthday) {
                const d = user.birthday.toDate ? user.birthday.toDate() : new Date(user.birthday.seconds * 1000 || user.birthday);
                birthStr = d.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });
                birthInputVal = d.toISOString().split('T')[0];
            }

            const iconLarge = user.icon 
                ? `<img src="${user.icon}" class="w-32 h-32 rounded-[40px] border-[6px] border-white shadow-2xl object-cover bg-white">` 
                : `<div class="w-32 h-32 rounded-[40px] bg-white flex items-center justify-center text-5xl font-bold text-indigo-100 border-[6px] border-white shadow-2xl">${(user.name||"?")[0]}</div>`;

            if (!isEditing) {
                // 表示モード
                content.innerHTML = `
                    <div class="bg-gradient-to-br from-indigo-500 to-purple-600 h-36 w-full relative overflow-hidden">
                        <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
                    </div>
                    <div class="px-8 pb-10 -mt-16 relative">
                        <div class="mb-6 flex justify-between items-end">
                            ${iconLarge}
                            <button onclick="window.toggleEditMode('${user.id}')" class="px-6 py-2 bg-white text-gray-800 font-bold rounded-xl shadow-lg hover:bg-gray-50 transition-all border border-gray-100 flex items-center gap-2">
                                <i class="fa-solid fa-pen-to-square text-indigo-500"></i> 編集
                            </button>
                        </div>
                        
                        <h3 class="text-3xl font-extrabold text-gray-800 mb-1">${user.name}</h3>
                        <p class="text-indigo-500 font-bold text-sm mb-6">${user.kana || ''}</p>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                                <span class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest block mb-1">学年 / 学部</span>
                                <span class="font-bold text-gray-800 text-lg">${user.year ? user.year + '年' : ''} ${user.faculty || '学部未設定'}</span>
                            </div>
                            <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                                <span class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest block mb-1">学籍番号</span>
                                <span class="font-bold text-gray-800 text-lg font-mono">${user.studentId || '未登録'}</span>
                            </div>
                            <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                                <span class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest block mb-1">担当パート</span>
                                <span class="font-bold text-gray-800">${getPartName(user.part)}</span>
                            </div>
                            <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                                <span class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest block mb-1">誕生日</span>
                                <span class="font-bold text-gray-800">${birthStr}</span>
                            </div>
                            <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100 col-span-full">
                                 <span class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest block mb-1">User System ID</span>
                                 <span class="font-mono text-[10px] text-gray-400 break-all">${user.id}</span>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                // 編集モード
                content.innerHTML = `
                    <div class="bg-gray-100 h-24 w-full relative"></div>
                    <div class="px-8 pb-10 -mt-12 relative">
                        <div class="flex justify-between items-start mb-6">
                             <div class="w-24 h-24 rounded-3xl bg-white shadow-xl flex items-center justify-center text-indigo-300 text-3xl font-black border-4 border-white">
                                ${(user.name||"?")[0]}
                             </div>
                             <div class="flex gap-2 mt-12">
                                <button onclick="window.toggleEditMode('${user.id}')" class="px-4 py-2 bg-gray-100 text-gray-500 font-bold rounded-xl hover:bg-gray-200 transition-all">キャンセル</button>
                                <button id="save-user-btn" class="px-6 py-2 bg-indigo-600 text-white font-bold rounded-xl shadow-indigo-200 shadow-xl hover:bg-indigo-700 transition-all">保存する</button>
                             </div>
                        </div>

                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest block mb-1 ml-1">氏名 / かな</label>
                                <div class="grid grid-cols-2 gap-2">
                                    <input type="text" id="edit-name" value="${user.name || ''}" class="edit-input" placeholder="氏名">
                                    <input type="text" id="edit-kana" value="${user.kana || ''}" class="edit-input" placeholder="かな">
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest block mb-1 ml-1">学年</label>
                                    <select id="edit-year" class="edit-input">
                                        <option value="">選択してください</option>
                                        <option value="1" ${user.year == '1' ? 'selected' : ''}>1年</option>
                                        <option value="2" ${user.year == '2' ? 'selected' : ''}>2年</option>
                                        <option value="3" ${user.year == '3' ? 'selected' : ''}>3年</option>
                                        <option value="4" ${user.year == '4' ? 'selected' : ''}>4年</option>
                                        <option value="5" ${user.year == '5' ? 'selected' : ''}>OB/OG</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest block mb-1 ml-1">学部</label>
                                    <input type="text" id="edit-faculty" value="${user.faculty || ''}" class="edit-input" placeholder="学部名">
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest block mb-1 ml-1">学籍番号</label>
                                    <input type="text" id="edit-studentId" value="${user.studentId || ''}" class="edit-input font-mono" placeholder="Student ID">
                                </div>
                                <div>
                                    <label class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest block mb-1 ml-1">担当パート</label>
                                    <select id="edit-part" class="edit-input">
                                        <option value="">選択してください</option>
                                        <option value="vocal" ${user.part?.toLowerCase() == 'vocal' ? 'selected' : ''}>ボーカル</option>
                                        <option value="guitar" ${user.part?.toLowerCase() == 'guitar' ? 'selected' : ''}>ギター</option>
                                        <option value="bass" ${user.part?.toLowerCase() == 'bass' ? 'selected' : ''}>ベース</option>
                                        <option value="drums" ${user.part?.toLowerCase() == 'drums' || user.part?.toLowerCase() == 'drum' ? 'selected' : ''}>ドラム</option>
                                        <option value="keyboard" ${user.part?.toLowerCase() == 'keyboard' ? 'selected' : ''}>キーボード</option>
                                    </select>
                                </div>
                            </div>

                            <div>
                                <label class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest block mb-1 ml-1">誕生日</label>
                                <input type="date" id="edit-birthday" value="${birthInputVal}" class="edit-input">
                            </div>
                        </div>
                    </div>
                `;

                const saveBtn = document.getElementById('save-user-btn');
                if (saveBtn) saveBtn.addEventListener('click', () => saveUserChanges(user.id));
            }
        }

        window.toggleEditMode = (userId) => {
            const user = usersData.find(u => u.id === userId);
            if (!user) return;
            isEditing = !isEditing;
            renderModalContent(user);
        };

        async function saveUserChanges(userId) {
            const saveBtn = document.getElementById('save-user-btn');
            if (saveBtn) {
                saveBtn.disabled = true;
                saveBtn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i>';
            }

            const name = document.getElementById('edit-name')?.value;
            const kana = document.getElementById('edit-kana')?.value;
            const year = document.getElementById('edit-year')?.value;
            const faculty = document.getElementById('edit-faculty')?.value;
            const studentId = document.getElementById('edit-studentId')?.value;
            const part = document.getElementById('edit-part')?.value;
            const birthdayInput = document.getElementById('edit-birthday')?.value;

            let birthday = null;
            if (birthdayInput) {
                birthday = Timestamp.fromDate(new Date(birthdayInput));
            }

            try {
                // 元のパス 'users' で更新
                const userRef = doc(db, 'users', userId);
                await updateDoc(userRef, {
                    name, kana, year, faculty, studentId, part, birthday
                });
                
                isEditing = false;
                const updatedUser = usersData.find(u => u.id === userId);
                if (updatedUser) {
                    Object.assign(updatedUser, { name, kana, year, faculty, studentId, part, birthday });
                    renderModalContent(updatedUser);
                }
            } catch (err) {
                console.error("Error updating user:", err);
                alert("保存に失敗しました。");
                if (saveBtn) {
                    saveBtn.disabled = false;
                    saveBtn.innerText = "保存する";
                }
            }
        }

        window.closeUserDetail = () => {
            const modal = document.getElementById('user-detail-modal');
            if (modal) modal.classList.add('hidden');
        };

        // ----------------------------------------------------
        // Event Listeners
        // ----------------------------------------------------

        document.getElementById('view-grid-btn')?.addEventListener('click', () => {
            viewMode = "grid";
            updateViewButtons();
            renderUsers();
        });
        document.getElementById('view-table-btn')?.addEventListener('click', () => {
            viewMode = "table";
            updateViewButtons();
            renderUsers();
        });

        function updateViewButtons() {
            const gridBtn = document.getElementById('view-grid-btn');
            const tableBtn = document.getElementById('view-table-btn');
            if (!gridBtn || !tableBtn) return;
            
            [gridBtn, tableBtn].forEach(b => b.classList.remove('bg-white', 'shadow-sm', 'text-indigo-600'));
            [gridBtn, tableBtn].forEach(b => b.classList.add('text-gray-400'));
            
            const active = viewMode === 'grid' ? gridBtn : tableBtn;
            active.classList.add('bg-white', 'shadow-sm', 'text-indigo-600');
            active.classList.remove('text-gray-400');
        }

        document.getElementById('user-search-input')?.addEventListener('input', (e) => {
            userSearchQuery = e.target.value;
            renderUsers();
        });

        document.getElementById('user-current-toggle')?.addEventListener('change', (e) => {
            userShowOnlyCurrent = e.target.checked;
            renderUsers();
        });

        document.getElementById('user-sort-select')?.addEventListener('change', (e) => {
            userSortOrder = e.target.value;
            renderUsers();
        });

        document.getElementById('select-all-checkbox')?.addEventListener('change', (e) => {
            if (e.target.checked) filteredData.forEach(u => selectedUserIds.add(u.id));
            else filteredData.forEach(u => selectedUserIds.delete(u.id));
            renderUsers();
        });

        document.getElementById('csv-download-btn')?.addEventListener('click', () => {
            if (selectedUserIds.size === 0) return;
            const selectedUsers = usersData.filter(u => selectedUserIds.has(u.id));
            selectedUsers.sort((a, b) => (parseInt(a.year) || 99) - (parseInt(b.year) || 99));
            
            const headers = ['名前', 'かな', '学年', '学部', '学籍番号', 'パート', '誕生日', 'システムID'];
            const rows = selectedUsers.map(u => {
                let birthStr = '';
                if (u.birthday) {
                    const d = u.birthday.toDate ? u.birthday.toDate() : new Date(u.birthday.seconds * 1000 || u.birthday);
                    birthStr = d.toLocaleDateString('ja-JP');
                }
                return [
                    u.name || '', u.kana || '', u.year ? u.year + '年' : '', u.faculty || '', u.studentId || '',
                    getPartName(u.part), birthStr, u.id
                ].map(val => `"${val.toString().replace(/"/g, '""')}"`).join(',');
            });

            const csvContent = "\ufeff" + [headers.join(','), ...rows].join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `members_export_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        document.getElementById('user-detail-modal')?.addEventListener('click', window.closeUserDetail);

    </script>
</body>
</html>
