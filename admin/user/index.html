<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members - LMC Admin</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 共通CSS -->
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* 万が一の真っ白防止用 */
        body.loading-failed { display: block !important; }
    </style>
</head>
<body id="main-body" class="min-h-screen flex overflow-hidden bg-[#f8fafc]">
    <!-- ローディング画面 (真っ白防止) -->
    <div id="initial-loader" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="w-16 h-16 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
        <p class="text-xs font-bold text-gray-400 tracking-widest uppercase">Initializing System...</p>
    </div>

    <!-- サイドバーコンテナ (共通JSで中身が挿入されます) -->
    <div id="sidebar-container"></div>

    <!-- メインコンテンツ -->
    <main class="flex-1 ml-[260px] h-screen overflow-y-auto p-8 relative">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-xl font-extrabold text-gray-800 uppercase tracking-widest">Members</h2>
                <p class="text-[10px] text-gray-400 mt-1 font-bold uppercase tracking-wider">部員名簿・検索・管理</p>
            </div>
            <div id="db-status" class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest flex items-center gap-2">
                <i class="fa-solid fa-circle text-[8px] text-gray-300"></i> Connecting...
            </div>
        </header>

        <!-- ツールバー: 検索 & フィルタ -->
        <div class="bg-white rounded-[28px] shadow-sm border border-gray-100 p-6 mb-8">
            <div class="flex flex-wrap items-center justify-between gap-4">
                <!-- 検索ボックス -->
                <div class="flex flex-1 items-center gap-3 bg-gray-50 px-5 py-3 rounded-2xl max-w-md focus-within:ring-2 focus-within:ring-indigo-100 transition-all">
                    <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                    <input type="text" id="user-search-input" placeholder="名前・かな・学籍番号で検索..." class="bg-transparent border-none outline-none text-sm w-full font-bold">
                </div>

                <!-- コントロールエリア -->
                <div class="flex items-center gap-6">
                    <!-- 現役生フィルタ -->
                    <div class="flex items-center gap-3 bg-gray-50 px-4 py-2 rounded-xl border border-gray-100 shadow-sm">
                        <span class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest whitespace-nowrap">現役生のみ表示 (1-4年)</span>
                        <label class="switch">
                            <input type="checkbox" id="user-current-toggle" checked>
                            <span class="slider"></span>
                        </label>
                    </div>

                    <!-- ソート順 -->
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest">Sort:</span>
                        <select id="user-sort-select" class="bg-gray-50 border-none rounded-xl px-4 py-2 text-xs font-bold outline-none cursor-pointer hover:bg-gray-100 transition shadow-sm text-gray-700">
                            <option value="name">名前順 (読み)</option>
                            <option value="year">学年順</option>
                            <option value="birthday">誕生日順</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- ユーザーグリッド表示 -->
        <div id="users-grid-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            <div class="col-span-full py-10 text-center text-gray-400 font-bold">
                <span id="loading-status-text">Loading members data...</span>
            </div>
        </div>
    </main>

    <!-- ================= MODALS ================= -->

    <!-- 個人詳細モーダル -->
    <div id="user-detail-modal" class="hidden fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4">
        <div onclick="event.stopPropagation()" class="bg-white w-full max-w-lg rounded-[40px] shadow-2xl overflow-hidden relative animate-in zoom-in duration-200 flex flex-col max-h-[90vh]">
            <button onclick="window.closeUserDetail()" class="absolute top-4 right-4 w-10 h-10 bg-white/80 hover:bg-white rounded-full flex items-center justify-center text-gray-500 z-20 shadow-sm"><i class="fa-solid fa-xmark"></i></button>
            <div id="user-modal-content" class="overflow-y-auto flex-1 p-0 text-left">
                <!-- JSでコンテンツが動的に注入されます -->
            </div>
        </div>
    </div>

    <!-- Logic -->
    <script type="module">
        import { initAdminPage, db } from "/js/admin-common.js";
        import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let usersData = [];
        let userSearchQuery = "";
        let userShowOnlyCurrent = true;
        let userSortOrder = "name";

        // 安全装置: 5秒経っても初期化が終わらなければ強制解除
        const safetyTimer = setTimeout(() => {
            const loader = document.getElementById('initial-loader');
            if (loader) loader.remove();
        }, 5000);

        // 初期化 (ページID: users)
        initAdminPage('users', (user) => {
            clearTimeout(safetyTimer);
            console.log("Admin Users Module Loaded.");

            // ユーザーデータのリアルタイム監視
            onSnapshot(collection(db, 'users'), 
                (s) => {
                    usersData = s.docs.map(d => ({id:d.id, ...d.data()}));
                    console.log(`Users loaded: ${usersData.length} records`);
                    renderUsers();
                },
                (error) => {
                    console.error("Error fetching users:", error);
                    document.getElementById('loading-status-text').innerText = "Error loading members data.";
                }
            );
        });

        // ----------------------------------------------------
        // Render Functions
        // ----------------------------------------------------

        function renderUsers() {
            const container = document.getElementById('users-grid-container');
            if (!container) return;

            const q = userSearchQuery.toLowerCase();
            
            // 1. 検索フィルタ
            let filtered = usersData.filter(u => 
                (u.name || "").toLowerCase().includes(q) || 
                (u.kana || "").toLowerCase().includes(q) || 
                (u.studentId || "").toLowerCase().includes(q)
            );
            
            // 2. 現役生フィルタ (学年が1〜4の人を現役生とする)
            if (userShowOnlyCurrent) {
                filtered = filtered.filter(u => {
                    const year = parseInt(u.year);
                    return !isNaN(year) && year >= 1 && year <= 4;
                });
            }
            
            // 3. ソート処理
            filtered.sort((a,b) => {
                if (userSortOrder === "name") {
                    return (a.kana || a.name || "").localeCompare(b.kana || b.name || "", "ja");
                } else if (userSortOrder === "year") {
                    const yearA = parseInt(a.year) || 99;
                    const yearB = parseInt(b.year) || 99;
                    return yearA - yearB;
                } else {
                    const dateA = a.birthday?.seconds || 0;
                    const dateB = b.birthday?.seconds || 0;
                    return dateB - dateA;
                }
            });

            if (filtered.length === 0 && usersData.length > 0) {
                container.innerHTML = `<div class="col-span-full py-20 text-center text-gray-300 font-bold text-[10px] tracking-widest uppercase">No Match Found</div>`;
                return;
            }
            
            // 学年ごとのカラーマップ
            const getYearColor = (year) => {
                const y = parseInt(year);
                switch(y) {
                    case 1: return 'bg-blue-50 text-blue-500 border-blue-100';
                    case 2: return 'bg-emerald-50 text-emerald-500 border-emerald-100';
                    case 3: return 'bg-amber-50 text-amber-600 border-amber-100';
                    case 4: return 'bg-rose-50 text-rose-500 border-rose-100';
                    default: return 'bg-gray-50 text-gray-400 border-gray-100';
                }
            };
            
            container.innerHTML = filtered.map(user => {
                const iconHtml = user.icon 
                    ? `<img src="${user.icon}" class="w-12 h-12 rounded-full object-cover border border-gray-100 shadow-sm group-hover:scale-105 transition-transform duration-300">` 
                    : `<div class="w-12 h-12 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 font-bold border border-indigo-50 shadow-sm text-lg">${(user.name||"?")[0]}</div>`;

                const yearColorClass = getYearColor(user.year);

                return `
                <div onclick="window.showUserDetail('${user.id}')" class="cursor-pointer p-5 border border-gray-100 rounded-[28px] hover:shadow-xl hover:-translate-y-0.5 transition-all flex items-center gap-4 bg-white shadow-sm group">
                    <div class="flex-shrink-0">
                        ${iconHtml}
                    </div>
                    <div class="flex-1 min-w-0 text-left">
                        <div class="flex items-center gap-2 mb-0.5">
                            <h4 class="font-bold text-gray-800 text-base group-hover:text-indigo-600 transition-colors whitespace-nowrap overflow-visible">${user.name}</h4>
                            ${user.year ? `<span class="${yearColorClass} text-[9px] font-black px-1.5 py-0.5 rounded-md border uppercase leading-none flex-shrink-0">${user.year}年</span>` : ''}
                        </div>
                        <p class="text-[10px] text-gray-400 font-bold tracking-wider truncate">${user.kana || ''}</p>
                    </div>
                    <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-200 group-hover:bg-indigo-50 group-hover:text-indigo-500 transition-colors">
                        <i class="fa-solid fa-chevron-right text-[10px]"></i>
                    </div>
                </div>`;
            }).join('');
        }

        // ----------------------------------------------------
        // Detail Modal Functions
        // ----------------------------------------------------

        window.showUserDetail = (userId) => {
            const user = usersData.find(u => u.id === userId);
            if (!user) return;
            
            const modal = document.getElementById('user-detail-modal');
            const content = document.getElementById('user-modal-content');
            
            let birthStr = '-';
            if (user.birthday) {
                const d = user.birthday.toDate ? user.birthday.toDate() : new Date(user.birthday.seconds * 1000);
                birthStr = d.toLocaleDateString('ja-JP');
            }

            const iconLarge = user.icon 
                ? `<img src="${user.icon}" class="w-32 h-32 rounded-[40px] border-[6px] border-white shadow-2xl object-cover bg-white">` 
                : `<div class="w-32 h-32 rounded-[40px] bg-white flex items-center justify-center text-5xl font-bold text-indigo-200 border-[6px] border-white shadow-2xl">${(user.name||"?")[0]}</div>`;

            content.innerHTML = `
                <div class="bg-gradient-to-br from-indigo-500 to-purple-600 h-40 w-full relative overflow-hidden">
                    <div class="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
                </div>
                <div class="px-8 pb-10 -mt-16 relative">
                    <div class="mb-6 flex justify-between items-end">
                        ${iconLarge}
                    </div>
                    
                    <h3 class="text-3xl font-extrabold text-gray-800 mb-1">${user.name}</h3>
                    <p class="text-indigo-500 font-bold text-sm mb-6">${user.kana || ''}</p>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                            <span class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest block mb-1">学年</span>
                            <span class="font-bold text-gray-800 text-lg">${user.year ? user.year + ' 年生' : '未登録'}</span>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                            <span class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest block mb-1">学籍番号</span>
                            <span class="font-bold text-gray-800 text-lg">${user.studentId || '未登録'}</span>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                            <span class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest block mb-1">パート / 担当</span>
                            <span class="font-bold text-gray-800">${user.part || '未設定'}</span>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                            <span class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest block mb-1">誕生日</span>
                            <span class="font-bold text-gray-800">${birthStr}</span>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100 col-span-full">
                             <span class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest block mb-1">システムID</span>
                             <span class="font-mono text-xs text-gray-500">${user.id}</span>
                        </div>
                    </div>
                </div>
            `;
            
            modal.classList.remove('hidden');
            modal.classList.add('modal-active');
        };

        window.closeUserDetail = () => {
            const modal = document.getElementById('user-detail-modal');
            if (modal) {
                modal.classList.remove('modal-active');
                setTimeout(() => modal.classList.add('hidden'), 200);
            }
        };

        // 検索・フィルタのイベント設定
        document.getElementById('user-search-input').addEventListener('input', (e) => {
            userSearchQuery = e.target.value;
            renderUsers();
        });

        document.getElementById('user-current-toggle').addEventListener('change', (e) => {
            userShowOnlyCurrent = e.target.checked;
            renderUsers();
        });

        document.getElementById('user-sort-select').addEventListener('change', (e) => {
            userSortOrder = e.target.value;
            renderUsers();
        });

    </script>
</body>
</html>
