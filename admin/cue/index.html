<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cue Sheets - LMC Admin</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 共通CSS -->
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* 万が一の真っ白防止用 */
        body.loading-failed { display: block !important; }
    </style>
</head>
<body id="main-body" class="min-h-screen flex overflow-hidden bg-[#f8fafc]">
    <!-- ローディング画面 (真っ白防止) -->
    <div id="initial-loader" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="w-16 h-16 border-4 border-emerald-100 border-t-emerald-600 rounded-full animate-spin mb-4"></div>
        <p class="text-xs font-bold text-gray-400 tracking-widest uppercase">Initializing System...</p>
    </div>

    <!-- サイドバーコンテナ -->
    <div id="sidebar-container"></div>

    <!-- メインコンテンツ -->
    <main class="flex-1 ml-[260px] h-screen overflow-y-auto p-8 relative">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-xl font-extrabold text-gray-800 uppercase tracking-widest">Cue Sheets</h2>
                <p class="text-[10px] text-gray-400 mt-1 font-bold uppercase tracking-wider">PA・照明要望シートの管理</p>
            </div>
            <div id="db-status" class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest flex items-center gap-2">
                <i class="fa-solid fa-circle text-[8px] text-gray-300"></i> Connecting...
            </div>
        </header>

        <!-- ツールバー -->
        <div class="bg-white rounded-[28px] shadow-sm border border-gray-100 p-6 mb-8">
            <div class="flex flex-wrap items-center justify-between gap-4">
                <div class="flex flex-1 items-center gap-3 bg-gray-50 px-5 py-3 rounded-2xl max-w-md focus-within:ring-2 focus-within:ring-emerald-100 transition-all">
                    <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                    <input type="text" id="cue-search-input" placeholder="バンド名で検索..." class="bg-transparent border-none outline-none text-sm w-full font-bold">
                </div>
                <button onclick="window.openAddCuesheetModal()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-2xl font-bold text-xs flex items-center gap-2 transition-all shadow-lg shadow-emerald-100">
                    <i class="fa-solid fa-plus"></i> Cueシートを追加
                </button>
            </div>
        </div>

        <!-- Cueシートリスト -->
        <div id="cuesheets-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full py-10 text-center text-gray-400 font-bold">
                <span id="loading-status-text">Loading Cue Sheets...</span>
            </div>
        </div>
    </main>

    <!-- ================= MODALS ================= -->

    <!-- 1. 新規登録モーダル -->
    <div id="add-cuesheet-modal" class="hidden fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4">
        <div onclick="event.stopPropagation()" class="bg-white w-full max-w-md rounded-[32px] shadow-2xl overflow-hidden relative animate-in zoom-in duration-200 flex flex-col p-8">
            <button onclick="window.closeAddCuesheetModal()" class="absolute top-4 right-4 w-10 h-10 bg-gray-100 hover:bg-gray-200 rounded-full flex items-center justify-center text-gray-500"><i class="fa-solid fa-xmark"></i></button>
            <h3 class="text-xl font-black text-gray-800 mb-6">Cueシートの新規登録</h3>
            
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest block mb-2">提出対象のバンド</label>
                    <div class="relative">
                        <select id="new-cue-band-id" class="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 font-bold text-gray-800 outline-none appearance-none">
                            <!-- JSで生成 -->
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-300 pointer-events-none"></i>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-extrabold text-gray-400 uppercase tracking-widest block mb-2">ファイル (PDF等)</label>
                    <div class="relative w-full h-32 border-2 border-dashed border-gray-200 rounded-2xl flex flex-col items-center justify-center gap-2 hover:bg-gray-50 transition-colors group cursor-pointer">
                        <i class="fa-solid fa-file-arrow-up text-gray-300 text-2xl group-hover:text-emerald-400"></i>
                        <span id="file-name-label" class="text-xs font-bold text-gray-400">ファイルをタップして選択</span>
                        <input type="file" id="new-cue-file" class="absolute inset-0 opacity-0 cursor-pointer" onchange="window.updateFileNameLabel(this)">
                    </div>
                </div>
                <button onclick="window.handleNewCuesheetSubmit()" class="w-full bg-emerald-600 text-white py-4 rounded-[22px] font-bold text-[11px] uppercase tracking-[0.2em] shadow-xl">登録を実行する</button>
            </div>

            <!-- Uploading Overlay -->
            <div id="add-cuesheet-loader" class="uploading-overlay hidden flex-col gap-3 text-center">
                <i class="fa-solid fa-spinner fa-spin text-emerald-600 text-3xl"></i>
                <span class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest">Uploading...</span>
            </div>
        </div>
    </div>

    <!-- 2. 確認モーダル -->
    <div id="confirm-modal" class="hidden fixed inset-0 z-[70] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div onclick="event.stopPropagation()" class="bg-white w-full max-w-sm rounded-[32px] p-8 shadow-2xl text-center animate-in zoom-in duration-200">
            <div class="w-16 h-16 bg-red-100 text-red-600 rounded-2xl flex items-center justify-center mx-auto mb-6"><i class="fa-solid fa-trash-can text-2xl"></i></div>
            <h3 class="text-lg font-black text-gray-800 mb-2">確認</h3>
            <p id="confirm-modal-text" class="text-sm text-gray-500 mb-8 font-medium leading-relaxed"></p>
            <div class="flex gap-4">
                <button onclick="window.closeConfirmModal()" class="flex-1 py-4 text-sm font-bold text-gray-400 hover:text-gray-600 transition-colors">キャンセル</button>
                <button id="confirm-action-btn" class="flex-1 py-4 bg-red-600 text-white rounded-2xl text-sm font-bold shadow-lg shadow-red-100 hover:bg-red-700 transition-all">実行する</button>
            </div>
        </div>
    </div>

    <!-- Logic -->
    <script type="module">
        import { initAdminPage, db } from "/js/admin-common.js";
        import { collection, onSnapshot, addDoc, deleteDoc, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let cuesheetsData = [], bandsData = [];
        let cueSearchQuery = "";
        let currentConfirmAction = null;

        const safetyTimer = setTimeout(() => {
            const loader = document.getElementById('initial-loader');
            if (loader) loader.remove();
        }, 5000);

        initAdminPage('cuesheets', (user) => {
            clearTimeout(safetyTimer);
            console.log("Admin Cuesheets Module Loaded.");

            onSnapshot(collection(db, 'bands'), (s) => {
                bandsData = s.docs.map(d => ({id:d.id, ...d.data()}));
                populateBandSelect();
            }, (err) => console.error(err));

            onSnapshot(collection(db, 'cuesheets'), (s) => {
                cuesheetsData = s.docs.map(d => ({id:d.id, ...d.data()}));
                renderCuesheets();
            }, (err) => {
                console.error(err);
                document.getElementById('loading-status-text').innerText = "Error loading data.";
            });
        });

        function renderCuesheets() {
            const container = document.getElementById('cuesheets-list-container');
            if (!container) return;
            const q = cueSearchQuery.toLowerCase();
            const filtered = cuesheetsData.filter(c => (c.bandName || "").toLowerCase().includes(q));

            filtered.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

            if (filtered.length === 0 && cuesheetsData.length > 0) {
                container.innerHTML = `<div class="col-span-full py-20 text-center text-gray-300 font-bold uppercase tracking-widest">No Match Found</div>`;
                return;
            }

            container.innerHTML = filtered.map(cue => {
                const band = bandsData.find(b => b.id === cue.bandId);
                const dateStr = cue.createdAt ? (cue.createdAt.toDate ? cue.createdAt.toDate() : new Date(cue.createdAt.seconds * 1000)).toLocaleDateString('ja-JP', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'}) : '-';

                return `
                <div class="bg-white p-6 rounded-[32px] border border-gray-100 shadow-sm hover:shadow-xl transition-all group flex flex-col justify-between">
                    <div class="flex items-center gap-3 mb-4">
                        ${band?.icon ? `<img src="${band.icon}" class="w-10 h-10 rounded-xl object-cover">` : `<div class="w-10 h-10 bg-emerald-100 rounded-xl flex items-center justify-center text-emerald-600 font-bold">${(cue.bandName||"?")[0]}</div>`}
                        <div class="min-w-0">
                            <h4 class="font-bold text-gray-800 truncate text-sm">${cue.bandName}</h4>
                            <p class="text-[9px] text-gray-400 font-bold uppercase">提出: ${dateStr}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <a href="${cue.fileUrl}" target="_blank" class="flex-1 bg-emerald-50 text-emerald-600 text-center py-3 rounded-2xl text-[10px] font-extrabold uppercase tracking-widest hover:bg-emerald-600 hover:text-white transition-all">表示</a>
                        <button onclick="window.requestDeleteCue('${cue.id}')" class="w-10 flex items-center justify-center text-gray-300 hover:text-red-500 bg-gray-50 rounded-2xl transition-all"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>`;
            }).join('');
        }

        window.openAddCuesheetModal = () => {
            const modal = document.getElementById('add-cuesheet-modal');
            modal.classList.remove('hidden');
            modal.style.display = 'flex';
        };

        window.closeAddCuesheetModal = () => {
            const modal = document.getElementById('add-cuesheet-modal');
            modal.style.display = 'none';
        };

        function populateBandSelect() {
            const select = document.getElementById('new-cue-band-id');
            if (!select) return;
            const activeBands = bandsData.filter(b => !b.isArchived).sort((a,b) => (a.name||"").localeCompare(b.name||"", "ja"));
            select.innerHTML = activeBands.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
        }

        window.updateFileNameLabel = (input) => {
            document.getElementById('file-name-label').innerText = input.files[0] ? input.files[0].name : "ファイルをタップして選択";
        };

        window.handleNewCuesheetSubmit = async () => {
            const bid = document.getElementById('new-cue-band-id').value;
            const file = document.getElementById('new-cue-file').files[0];
            if(!bid || !file) return;

            const loader = document.getElementById('add-cuesheet-loader');
            loader.classList.remove('hidden');

            try {
                const formData = new FormData();
                formData.append('reqtype', 'fileupload');
                formData.append('fileToUpload', file);
                const res = await fetch('https://catbox.moe/user/api.php', { method: 'POST', body: formData });
                const url = await res.text();

                const band = bandsData.find(b => b.id === bid);
                await addDoc(collection(db, 'cuesheets'), { bandId: bid, bandName: band?.name || "Unknown", fileUrl: url, createdAt: serverTimestamp() });
                await updateDoc(doc(db, 'bands', bid), { latestCuesheetUrl: url });
                window.closeAddCuesheetModal();
            } catch (err) { console.error(err); alert("Upload failed"); }
            loader.classList.add('hidden');
        };

        window.requestDeleteCue = (id) => {
            window.openConfirmModal("このCueシートを削除しますか？", async () => {
                await deleteDoc(doc(db, 'cuesheets', id));
            });
        };

        window.openConfirmModal = (t, a) => {
            document.getElementById('confirm-modal-text').innerText = t;
            currentConfirmAction = a;
            const modal = document.getElementById('confirm-modal');
            modal.classList.remove('hidden');
            modal.style.display = 'flex';
        };

        window.closeConfirmModal = () => {
            const modal = document.getElementById('confirm-modal');
            modal.style.display = 'none';
        };

        document.getElementById('confirm-action-btn').onclick = async () => {
            if(currentConfirmAction) await currentConfirmAction();
            window.closeConfirmModal();
        };

        document.getElementById('cue-search-input').addEventListener('input', (e) => { cueSearchQuery = e.target.value; renderCuesheets(); });
    </script>
</body>
</html>
