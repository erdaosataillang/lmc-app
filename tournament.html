<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        :root {
            --bg-dark: #000000;
            --card-bg: #111111;
            --accent-blue: #2563eb;
            --accent-green: #10b981;
        }

        body { 
            background-color: var(--bg-dark); 
            color: #ffffff; 
            font-family: 'Noto Sans JP', sans-serif;
            overflow-x: hidden;
        }

        .cyber-font { font-family: 'Orbitron', sans-serif; }

        /* 対戦カード：表示側はよりシンプルで高級感のあるデザインに */
        .match-card { 
            background: var(--card-bg); 
            border: 1px solid #222; 
            position: relative; 
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .winner-card { 
            border-color: var(--accent-green); 
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.1); 
        }

        /* 集中モード：試合を画面いっぱいに表示 */
        .focus-mode .match-card {
            transform: scale(1.2);
            max-width: 800px;
            margin: 10vh auto;
            border-width: 2px;
        }

        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 管理者用：表示を区別 */
        .admin-only { display: none; }
        .is-admin .admin-only { display: block; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div id="app" class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-16 border-b border-white/10 pb-8">
            <div>
                <h1 id="mainTitle" class="text-5xl font-black tracking-tighter cyber-font">MATCH <span class="text-blue-600">BOARD</span></h1>
                <p id="adminStatus" class="admin-only text-red-500 text-[10px] mt-2 font-bold tracking-widest uppercase">Admin Control Mode</p>
            </div>
            <div id="viewStatus" class="admin-only text-[10px] font-bold px-3 py-1 bg-white/5 rounded border border-white/10"></div>
        </header>

        <section id="adminSection" class="admin-only mb-16 space-y-6 fade-in">
            <div class="bg-blue-900/20 border border-blue-500/30 p-8 rounded-3xl shadow-2xl">
                <h2 class="text-sm font-black mb-6 cyber-font text-blue-400 tracking-widest">REGISTRATION / CONTROL</h2>
                
                <div class="flex flex-col lg:flex-row items-stretch gap-6 mb-8">
                    <div class="flex-1 space-y-3 bg-black/40 p-4 rounded-xl border border-white/5">
                        <select id="userSelect1" class="w-full bg-neutral-900 border border-neutral-700 rounded-lg px-3 py-2 text-white text-sm outline-none focus:border-blue-500"></select>
                        <input type="text" id="guestName1" placeholder="名前を手入力" class="w-full bg-neutral-900/50 border border-neutral-800 rounded-lg px-3 py-2 text-sm text-gray-400 outline-none">
                    </div>
                    <div class="flex items-center justify-center cyber-font text-2xl font-black italic text-neutral-700">VS</div>
                    <div class="flex-1 space-y-3 bg-black/40 p-4 rounded-xl border border-white/5">
                        <select id="userSelect2" class="w-full bg-neutral-900 border border-neutral-700 rounded-lg px-3 py-2 text-white text-sm outline-none focus:border-blue-500"></select>
                        <input type="text" id="guestName2" placeholder="名前を手入力" class="w-full bg-neutral-900/50 border border-neutral-800 rounded-lg px-3 py-2 text-sm text-gray-400 outline-none">
                    </div>
                    <button id="createMatchBtn" class="bg-blue-600 hover:bg-blue-500 text-white px-10 py-4 rounded-xl font-black cyber-font text-sm transition-all shadow-lg active:scale-95">CREATE</button>
                </div>

                <div class="flex flex-wrap gap-4 pt-6 border-t border-white/5 items-center justify-between">
                    <div class="flex gap-2">
                        <button onclick="updateViewMode('all')" class="bg-neutral-800 hover:bg-neutral-700 px-4 py-2 rounded text-[10px] font-bold uppercase">View Overall</button>
                        <button onclick="updateViewMode('focus')" class="bg-neutral-800 hover:bg-neutral-700 px-4 py-2 rounded text-[10px] font-bold uppercase">Focus Match</button>
                    </div>
                    <button id="resetBtn" class="text-red-600 hover:text-red-400 text-[10px] font-bold uppercase">[ Danger: Reset All ]</button>
                </div>
            </div>
        </section>

        <main id="bracketDisplay" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWtITnn5uMOPBgOY0Bd7Rt5IN1ry8XoJI",
            authDomain: "urakata-app.firebaseapp.com",
            projectId: "urakata-app",
            storageBucket: "urakata-app.firebasestorage.app",
            messagingSenderId: "407777765696",
            appId: "1:407777765696:web:045c2d94729022b4eab2a5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const isAdmin = new URLSearchParams(window.location.search).get('mode') === 'admin';
        const DEFAULT_ICON = "https://ui-avatars.com/api/?background=222&color=fff&bold=true&name=";
        let currentViewMode = "all";

        if (isAdmin) {
            document.body.classList.add('is-admin');
            loadUsers();
        }

        // --- 設定同期 ---
        onSnapshot(doc(db, "tournaments", "settings"), (doc) => {
            const data = doc.data() || { viewMode: 'all' };
            currentViewMode = data.viewMode;
            document.getElementById('viewStatus').innerText = `MODE: ${currentViewMode.toUpperCase()}`;
        });

        window.updateViewMode = async (mode) => {
            await setDoc(doc(db, "tournaments", "settings"), { viewMode: mode }, { merge: true });
        };

        // --- ユーザー取得 ---
        async function loadUsers() {
            const selects = [document.getElementById('userSelect1'), document.getElementById('userSelect2')];
            const snap = await getDocs(collection(db, "users"));
            selects.forEach(s => {
                s.innerHTML = '<option value="">既存ユーザーを選択...</option>';
                snap.forEach(d => {
                    const u = d.data();
                    const opt = document.createElement('option');
                    opt.value = d.id;
                    opt.text = u.lineDisplayName || u.kana || "No Name";
                    opt.dataset.icon = u.icon || "";
                    s.appendChild(opt);
                });
            });
        }

        // --- 試合操作 ---
        document.getElementById('createMatchBtn').onclick = async () => {
            const getP = (n) => {
                const s = document.getElementById(`userSelect${n}`);
                const g = document.getElementById(`guestName${n}`).value;
                return { 
                    name: g || (s.selectedIndex > 0 ? s.options[s.selectedIndex].text : ""),
                    icon: g ? "" : (s.selectedIndex > 0 ? s.options[s.selectedIndex].dataset.icon : "")
                };
            };
            const p1 = getP(1), p2 = getP(2);
            if (!p1.name || !p2.name) return;

            const id = "m_" + Date.now();
            await setDoc(doc(db, "tournaments", "current", "matches", id), {
                p1: p1.name, p1Icon: p1.icon || (DEFAULT_ICON + encodeURIComponent(p1.name)),
                p2: p2.name, p2Icon: p2.icon || (DEFAULT_ICON + encodeURIComponent(p2.name)),
                winner: null, createdAt: Date.now()
            });
            document.getElementById('guestName1').value = ""; document.getElementById('guestName2').value = "";
        };

        window.deleteMatch = async (id) => {
            if (confirm("試合を削除しますか？")) await deleteDoc(doc(db, "tournaments", "current", "matches", id));
        };

        window.setWinner = async (id, key) => {
            await updateDoc(doc(db, "tournaments", "current", "matches", id), { winner: key });
        };

        // --- 描画 ---
        onSnapshot(query(collection(db, "tournaments", "current", "matches"), orderBy("createdAt", "asc")), (snap) => {
            const matches = [];
            snap.forEach(d => matches.push({ id: d.id, ...d.data() }));
            render(matches);
        });

        function render(matches) {
            const container = document.getElementById('bracketDisplay');
            container.className = currentViewMode === 'focus' ? "flex flex-col items-center justify-center min-h-[60vh] focus-mode" : "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10";

            let displayMatches = matches;
            if (currentViewMode === 'focus') {
                const active = matches.find(m => !m.winner);
                displayMatches = active ? [active] : matches;
            }

            container.innerHTML = displayMatches.map(m => `
                <div class="match-card p-8 rounded-3xl fade-in ${m.winner ? 'winner-card' : ''} w-full">
                    <div class="flex flex-col gap-8">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-5">
                                <img src="${m.p1Icon}" class="w-16 h-16 rounded-full border-2 border-white/10 object-cover bg-neutral-900">
                                <span class="text-2xl font-black ${m.winner === 'p1' ? 'text-green-400' : ''}">${m.p1}</span>
                            </div>
                            <div class="admin-only">
                                ${!m.winner ? `<button onclick="setWinner('${m.id}', 'p1')" class="bg-blue-600 px-3 py-1 rounded text-[10px] font-bold">WIN</button>` : ''}
                            </div>
                        </div>

                        <div class="flex items-center gap-4 opacity-20">
                            <div class="h-[1px] flex-1 bg-white"></div>
                            <span class="cyber-font text-[10px] font-black italic">VS</span>
                            <div class="h-[1px] flex-1 bg-white"></div>
                        </div>

                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-5">
                                <img src="${m.p2Icon}" class="w-16 h-16 rounded-full border-2 border-white/10 object-cover bg-neutral-900">
                                <span class="text-2xl font-black ${m.winner === 'p2' ? 'text-green-400' : ''}">${m.p2}</span>
                            </div>
                            <div class="admin-only">
                                ${!m.winner ? `<button onclick="setWinner('${m.id}', 'p2')" class="bg-blue-600 px-3 py-1 rounded text-[10px] font-bold">WIN</button>` : ''}
                            </div>
                        </div>
                    </div>

                    <div class="admin-only absolute -top-3 -left-3">
                        <button onclick="deleteMatch('${m.id}')" class="bg-red-600 text-white w-8 h-8 rounded-full border border-white/20 flex items-center justify-center font-bold shadow-lg">×</button>
                    </div>

                    ${m.winner ? `
                        <div class="absolute -top-3 -right-3 px-5 py-2 bg-green-500 text-black text-xs font-black rounded-full shadow-2xl animate-bounce">VICTORY</div>
                    ` : ''}
                </div>
            `).join('');
        }

        document.getElementById('resetBtn').onclick = async () => {
            if (confirm("全データをリセットしますか？")) {
                const q = await getDocs(collection(db, "tournaments", "current", "matches"));
                q.forEach(async (d) => await deleteDoc(d.ref));
            }
        };
    </script>
</body>
</html>
