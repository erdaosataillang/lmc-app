<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Tournament Real-time System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .match-card { background: #1e293b; border-left: 4px solid #3b82f6; transition: all 0.3s; }
        .winner { border-left-color: #10b981; background: #064e3b; }
        body { background-color: #0f172a; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="app" class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8 border-b border-gray-700 pb-4">
            <h1 class="text-2xl font-bold">裏方部 Tournament <span id="modeBadge" class="text-xs bg-blue-600 px-2 py-1 rounded ml-2">Display Mode</span></h1>
            <div id="adminControls" class="hidden flex gap-2">
                <input type="text" id="guestName" placeholder="飛び入り名" class="bg-gray-800 border border-gray-600 px-2 py-1 rounded text-sm">
                <button id="addGuestBtn" class="bg-green-600 text-sm px-3 py-1 rounded">追加</button>
                <button id="resetBtn" class="bg-red-600 text-sm px-3 py-1 rounded">リセット</button>
            </div>
        </div>

        <div id="bracket" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, collection, onSnapshot, setDoc, updateDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWtITnn5uMOPBgOY0Bd7Rt5IN1ry8XoJI",
            authDomain: "urakata-app.firebaseapp.com",
            projectId: "urakata-app",
            storageBucket: "urakata-app.firebasestorage.app",
            messagingSenderId: "407777765696",
            appId: "1:407777765696:web:045c2d94729022b4eab2a5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // URLのパラメータでモード判定 (?mode=admin で管理モード)
        const urlParams = new URLSearchParams(window.location.search);
        const isAdmin = urlParams.get('mode') === 'admin';
        
        if(isAdmin) {
            document.getElementById('adminControls').classList.remove('hidden');
            document.getElementById('modeBadge').innerText = "Admin Mode";
            document.getElementById('modeBadge').classList.replace('bg-blue-600', 'bg-red-600');
        }

        // --- 1. リアルタイムリスナー ---
        // 'tournaments/main/matches' コレクションを監視
        onSnapshot(collection(db, "tournaments", "current", "matches"), (snapshot) => {
            const matches = [];
            snapshot.forEach(doc => matches.push({id: doc.id, ...doc.data()}));
            renderBracket(matches.sort((a,b) => a.order - b.order));
        });

        // --- 2. 描画ロジック ---
        function renderBracket(matches) {
            const container = document.getElementById('bracket');
            if (matches.length === 0) {
                container.innerHTML = `<p class="col-span-full text-center text-gray-500">試合が組まれていません。管理画面から参加者を追加してください。</p>`;
                return;
            }

            container.innerHTML = matches.map(match => `
                <div class="match-card p-4 rounded shadow-lg ${match.winner ? 'winner' : ''}">
                    <div class="text-xs text-gray-400 mb-2 uppercase tracking-widest">Match ${match.order}</div>
                    <div class="flex justify-between items-center mb-3">
                        <span class="font-bold ${match.winner === 'p1' ? 'text-green-400' : ''}">${match.p1 || 'TBD'}</span>
                        ${isAdmin && !match.winner ? `<button onclick="setWinner('${match.id}', 'p1')" class="text-xs bg-blue-500 px-2 py-1 rounded">WIN</button>` : ''}
                    </div>
                    <div class="text-center text-gray-600 my-1 text-xs font-bold italic">VS</div>
                    <div class="flex justify-between items-center">
                        <span class="font-bold ${match.winner === 'p2' ? 'text-green-400' : ''}">${match.p2 || 'TBD'}</span>
                        ${isAdmin && !match.winner ? `<button onclick="setWinner('${match.id}', 'p2')" class="text-xs bg-blue-500 px-2 py-1 rounded">WIN</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // --- 3. 管理用アクション（グローバル関数化） ---
        window.setWinner = async (matchId, playerKey) => {
            await updateDoc(doc(db, "tournaments", "current", "matches", matchId), {
                winner: playerKey
            });
            // ここに「次の試合への自動進出ロジック」を後で追加可能
        };

        // 飛び入り追加（簡易的なマッチ生成）
        document.getElementById('addGuestBtn').onclick = async () => {
            const name = document.getElementById('guestName').value;
            if(!name) return;
            const id = Date.now().toString();
            await setDoc(doc(db, "tournaments", "current", "matches", id), {
                p1: name,
                p2: "（募集中）",
                order: Date.now(),
                winner: null
            });
            document.getElementById('guestName').value = "";
        };

        // リセット
        document.getElementById('resetBtn').onclick = async () => {
            if(!confirm("全試合を削除しますか？")) return;
            const q = await getDocs(collection(db, "tournaments", "current", "matches"));
            q.forEach(async (d) => await deleteDoc(d.ref));
        };

    </script>
</body>
</html>
